body:
  text: 測圓海鏡分類釋術卷七元李冶撰明顧應祥釋術通勾股和與别勾股弦測望一丙從城西門穿城東行二百五十六步而立丁從城北門穿城南行三百七十五步而立甲乙二人俱在城外西北乾隅甲向東乙向南各不知步數而立四人遙相望俱與城相叅直只云甲東乙南共步九百二十問城徑釋曰此以通勾股和與邉勾底股立法測望甲東行為勾乙南行為股共步為通勾股和丙穿城東行邉勾丁穿城南行底股也術曰丙東行自之得六萬五千五百三十六為邉勾筭丁南行自之得一十四萬六百二十五為底股筭相併得二十萬六千一百六十一為二筭和倍邉勾底股和與通勾股和相減餘三百四十二又減於邉勾底股和餘二百八十九自之得八萬三千五百二十一以減二筭和餘一十二萬二千六百四十為平實以邉勾底股和六百三十一為從半步為隅算作負隅減從開平方法除之得全徑負隅減從開平方法見二卷通勾勾條丙出東門不知步數而立丁出南門不知步數而立甲乙二人俱在城外西北乾隅甲東行乙南行各立定四人遙相望俱與城相叅直既而丁從立處向東北斜行四百二十五步與甲㑹丙從立處向西南斜行五百四十四步與乙㑹問甲乙行步則曰共行九百二十問城徑釋曰此通勾股和與邉弦底弦立法測望甲東行為通勾乙南行為通股共行九百二十通勾股和也丙從丁處斜行就甲底弦也丁從立處斜行就乙邉弦也術曰二弦相減餘自之得一萬四千一百六十一為實二弦相併減共行步餘四十九為法實如法而一得二百八十九減法為全徑丙出南門東行稍逺丁出東門南行稍近甲乙二人俱在城外西北乾隅甲東行乙南行各不知步數而立相望俱與城相叅直既而丙從立處向東北斜行二百七十二步與甲會丁從立處向東南斜行五百一十步與乙會問甲乙行步則曰共行九百二十步不知城徑㡬何釋曰此通勾股和與黄廣弦黄長弦立法測望甲東行為勾乙南行為股共行九百二十步為通勾股和也丙之就甲黄長弦也丁之就乙黄廣弦也術曰併二弦以減通勾股和餘一百三十八為差以併二弦乘差得一十萬七千九百一十六為實又以差加通勾股和得一千五十八為法實如法而一得一百二為太虚弦加差為全徑丙出南門東行稍逺丁出東門南行稍近甲乙二人俱在城外西北乾隅甲東行乙南行各不知步數而立相望俱與城相叅直既而丙從立處向西南斜行四百八步與乙會丁從立處向東北斜行一百七十步與甲會問甲乙行步則曰共行九百二十不知城徑㡬何釋曰此通勾股和與大差弦小差弦立法測望甲東行為通勾乙南行為通股共歩和也丙就乙大差弦也丁斜就甲小差弦也術曰二弦相併共五百七十八為二弦和以減通和餘三百四十二為中率以乘通和倍之得六十二萬九千二百八十為實三之通和得二千七百六十加中率得三千一百二為從二為隅算作負隅減從開平方除之得全徑負隅減從開平方法見二卷通勾股和與諸和較立法測望二甲丙二人俱在城外西北乾隅甲東行丙南行共九百二十步乙從城外東北艮隅南行丁從城外西南坤隅東行四人遙相望而立俱與城相叅直既而甲還至艮隅復南行一横一直共行二百三十步與乙會丙還至坤隅復東行一横一直共行五百五十二步與丁㑹問城徑釋曰此通勾股和與大差勾股和小差勾股和立法測望甲東行為勾丙南行為股共行九百二十步通勾股和也甲還至艮為小差勾復南行與乙會為小差股共行二百三十步小差勾股和也丙還至坤為大差股東行與丁會為大差勾共行五百五十二大差勾股和也術曰二差勾股和相併得七百八十二為大小差和和以減通勾股和得一百三十八即太虚勾股和又以大小差和和乘之得一十萬七千九百一十六為平實以通勾股和加太虚勾股和得一千五十八為法實如法而一得一百二為虚弦加虚和即城徑又曰併二差和減通和得一百三十八為虚勾股和二差和相減餘三百二十二乘之得四萬四千四百三十六如前術得一千五十八為法除之得四十二為虚勾股較以加和半之為股減和半之為勾甲丙二人俱在城外西北乾隅甲東行丙南行共九百二十步乙從城外東北艮隅南行丁從城外西南坤隅東行各不知步數而立與甲丙共四人遙相望俱與城相叅直既而乙復向東北斜行與甲㑹丁復向西南斜行與丙會問其行步乙曰我南行不及斜行二十步丁曰我東行不及斜行二百一十六步問城徑釋曰此通勾股和與大差勾弦較小差股弦較立法測望甲東行為通勾丙南行為通股共行九百二十步通勾股和也乙從艮隅南行為小差股斜行就甲為小差弦不及二十步小差股弦較也丁從坤隅東行為大差勾斜行就丙為大差弦不及二百一十六步大差勾弦較也術曰以小差股弦較減通和餘九百步復以二十步乘之得一萬八千於上又以大差勾弦較減九百餘六百八十四半之得三百四十二乘上位得六百一十五萬六千為立實三因小差股弦較得六十以減通和餘八百六十於上以半之大差勾弦較一百八減三百四十二餘二百三十四乘上位得二十萬一千二百四十為從方以大差勾弦較減通和餘七百四三之小差股弦較減通和餘八百六十相併得一千五百六十四於上又以大差勾弦較併三百四十二得五百五十八倍之得一千一百一十六減去小差股弦較二十餘一千九十六以減上位餘四百六十八為益亷四為常法作負隅帶亷減從開立方法除之得一百五十為小差股加較為弦弦較各自乘相減開其餘為勾負隅帶益亷減從開立方曰初商一百置一於左上為法置一乘益亷得四萬六千八百置一自之得一萬以隅法因之得四萬為隅法併益亷共八萬六千八百以減從方餘一十一萬四千四百四十為下法與上法相乘除實一千一百四十四萬四千實不滿法反除實六百一十五萬六千餘五百二十八萬八千為負積倍益亷得九萬三千六百三因隅法得一十二萬為方法三因初商得三百為亷法次商五十置一於左上為法置一乘從亷得二萬三千四百併入倍亷共一十一萬七千為益亷置一乘亷法得一萬五千隅因得六萬置一自之得二千五百隅因得一萬為隅法併方亷隅共一十九萬加益亷共三十萬七千以減從方不及減反減從方二十萬一千二百四十餘一十萬五千七百六十為負從與上法相乘除負積盡此法雖已見前因有翻法故重出又為帶從負隅添積開立方法甲丙二人俱在城外西北乾隅甲東行丙南行共九百二十步乙出東門東行丁出南門南行各不知步數而立四人遙相望俱與城相叅直既而乙從立處斜行與甲會丁從立處斜行與丙㑹以二斜行相和共三百九十一步相較得一百一十九步問城徑釋曰此通勾股和與上高下平弦和上高下平弦較立法測望甲東行通勾丙南行通股共步和也乙斜就甲下平弦丁斜就丙上高弦共步和也相較較也術曰二弦和自之得一十五萬二千八百八十一為和筭二弦較自之得一萬四千一百六十一為較筭較筭減弦筭餘半之得六萬九千三百六十為實以二弦和減通和餘五百二十九為從作減從開平方法除之得二百四十為全徑減從開平方法見二卷底勾勾條又曰和較相併半為高弦相減半之為平弦甲丙二人俱在城外西北乾隅甲東行丙南行共九百二十步乙丁二人俱在城外東南巽隅乙北行丁西行各不知步數而立四人遙相望俱與城相叅直既而乙復斜行至丁立處相㑹問其行步則曰乙直行比丁直行較多其多步與斜行步相併共一百四十四步相減餘六十步問城徑釋曰此通勾股和與太虚弦較和弦較較立法測望甲東行為通勾丙南行為通股共步通勾股和也乙從巽隅北行乃㢲之山與月之泛同太虚股也丁從巽隅西行乃㢲之月即泛之山太虚勾也乙斜行就丁乃山之月太虚弦也乙直行多於丁直行數太虚勾股較也以多步併斜行一百四十四弦較和也多歩減斜行六十弦較較也術曰弦較較減弦較和餘半之得四十二為太虛勾股較以減弦較和得弦自之得一萬四百四倍之減較自乘一千七百六十四餘一萬九千四十四為實平方開之得一百三十八為太虛勾股和加較半之為股減較半之為勾通勾弦和與諸和較測望三甲丙二人俱在城外西北乾隅甲直往東丙直往南乙丁二人俱在城之南門乙向東行丁向南行俱不知步數而立四人遙相望俱與城相叅直既而甲向西南斜至丙立處乙亦斜行至丁立處問其行步則甲直斜共行一千步乙直斜共行二百二十五步問城徑釋曰此以通勾弦和明勾弦和立法測望甲在乾往東為通勾斜行就丙為通弦直斜共步勾弦和也乙在南門東行為明勾斜行就丁為明弦直斜共步勾弦和也術曰乙共步自乘再乘得一千一百三十九萬六百二十五為平實乙共歩自之得五萬六百二十五為從甲共步一千為隅算作負隅以從減法開平方法除之得明股一百三十五負隅以從減法開平方曰置實以從隅約之初商一百置一於左上為法置一乘隅算得一十萬減去從方餘四萬九千三百七十五為下法與上法相乘除實四百九十三萬七千五百餘實六百四十五萬三千一百二十五為次實下法再加十萬共一十四萬九千三百七十五為方法次商三十置一於左次為上法置一乘隅算得三萬併入方法共一十七萬九千三百七十五為下法與上法相乘除實五百三十八萬一千二百五十餘實一百七萬一千八百七十五為次實下法内再加三萬共二十萬九千三百七十五為方法次商五置一於左次為上法置一乘隅算得五千併入方法共二十一萬四千三百七十五為下法相乘除實盡得明股一百三十五明股自之以勾弦和除之得勾弦較八十一加和半之為股減和半之為勾負隅以從減法開平方已見四卷大差勾黄長弦下因此法有三位故重出而小變之又為以從添積開平方其法曰初商一百置一於左上為法置一乘從得五百六萬二千五百為益積添積共一千六百四十五萬三千一百二十五為實置一乘隅得一十萬與上法相乘除實一千萬餘實六百四十五萬三千一百二十五倍隅法得二十萬為方法約次商三十置一於左次為上法置一乘從得一百五十一萬八千七百五十為益實添餘積共七百九十七萬一千八百七十五為實置一乘隅得三萬併方法共二十三萬為下法與上法相乘除實六百九十萬餘實一百七萬一千八百七十五下法内再加三萬共二十六萬為方法次商五置一於左上為法置一乘從方得二十五萬三千一百二十五為益積添入餘積共一百三十二萬五千為實置一乘隅得五千併方法共二十六萬五千為下法與上法相乘除實盡法已見前卷甲丙二人俱在城外西北乾隅甲東行丙南行乙丁二人俱出東門乙東行丁南行各不知步數而立四人遙相望俱與城相叅直既而甲復斜行與丙會乙復斜行與丁會問其行步甲直斜共一千步乙直斜共五十步問城徑釋曰此通勾弦和與勾弦和立法測望甲東行為通勾斜行就丙為通弦共步和也乙出東門而東勾也斜行就丁弦也和為共步術曰通勾弦和内減二之勾弦和餘九百為汎率汎率自之得八十一萬半之得四十萬五千勾弦和乘汎率得四萬五千二數相併得四十五萬為平實二十二乘汎率得一萬九千八百四十二乘和得二千一百減汎率得一千二百二數相併得二萬一千為益從四之勾弦和得二百為隅法作負隅減從開平方法除之得股三十負隅減從開平方法見二卷通勾勾條甲丙二人俱在城外西北乾隅甲東行丙南行各不知步數而立遙望與城相叅直既而甲復向西南斜行與丙相會問其行步甲一直一斜共一千步甲斜直相較與甲之斜丙之直相較共四百四十步問城徑釋曰此通勾弦和與勾弦較股弦較和立法測望甲東行為通勾丙南行為通股甲斜行為通弦一直一斜勾弦和也直斜相較為勾弦較甲斜丙直相較為股弦較兩相較共四百四十步二較和也術曰以二較和減勾弦和餘五百六十半之自乘得七萬八千四百為平實以和一千為從方二分五釐為常法作減從開平方法開之得八十為小差勾負隅減從開平方法見二卷又曰以二較和減勾弦和餘五百六十自之得三十一萬三千六百為平實四之勾弦和得四千為從方作減從開平方除之得八十不用負隅通股弦和與諸和較測望四甲丙二人俱在城外西北乾隅甲東行丙南行乙丁二人俱出南門乙東行丁南行各不知步數而立四人遙相望俱與城相叅直既而甲復斜行與丙會乙復斜行與丁會問其行步則甲之斜與丙之直共一千二百八十步乙之斜與丁之直共二百八十八步問城徑釋曰此通股弦和與明股弦和立法測望甲東行為通勾丙南行通股也甲斜行與丙㑹通弦也甲之斜丙之直共步通股弦和也乙出南門東行為明勾丁南行明股也乙斜行與丁會明弦也乙之斜丁之直共步明股弦和也術曰二和相減餘九百九十二以明和乘之得二十八萬五千六百九十六減明和筭餘二十萬二千七百五十二半之得一十萬一千三百七十六為泛率以五萬七千六百乘泛率得五十八億三千九百二十五萬七千六百為平實通和加二之明和又半之得九百二十八為次率次率乘泛率得九千四百七萬六千九百二十八明和乘泛率得二千九百一十九萬六千二百八十八二數相減餘六千四百八十八萬六百四十為從方次率自之得二千二百八以明和乘之得六十三萬五千九百四二數相減餘二十二萬五千二百八十為隅法作帶從平方開之得明勾七十二勾自乘和除之得股弦較以加和半之為弦減和半之為股帶從隅開平方曰置實從隅約之初商七十置一於左上為法置一乘負隅得一千五百七十六萬九千六百為隅法併從方共八千六十五萬二百四十為下法與上法相乘除實五十六億四千五百五十一萬六千八百餘一億九千三百七十四萬八百為次實二因隅法得三千一百五十三萬九千二百為亷法次商二置一於左上為法置一乘隅法得四十五萬五百六十為隅法併從方亷法共九千六百八十七萬四百為下法與上法相乘此條平實原係一百二億七千七百九萬三千三百七十六數多故減之甲丙二人俱在城外西北乾隅甲東行丙南行乙丁二人俱出城東門乙東行丁南行各不知步數而立四人遙相望俱與城相叅直既而丙復斜行與甲相㑹丁亦斜行與乙相㑹問其行步則曰丙一直一斜共一千二百八十步丁一直一斜共行六十四步問城徑釋曰此通股弦和與股弦和立法測望甲東行為通勾丙南行通股也丙又斜行與甲會通弦也一直一斜共步通股弦和也乙出東門為勾丁南行股也丁又斜行與乙會弦也一直一斜共步股弦和也術曰二共步相乘得八萬一千九百二十為平實以通股弦和一千二百八十為從以和除通和得二十為汎率減一自之得三百六十一倍汎率減一得三十九相併共得四百為隅算作以從減泛負隅開平方法除之得勾一十六步勾自乘得二百五十六以勾股和除之得股弦較四加和半之為弦減和半之為股負隅以從減法開平方見四卷大差勾黄長弦條又為以從添積開平方法通弦和和與諸和較測望五甲乙同在城外西北乾隅甲南行較逺乙東行較近隔城斜望與城相叅直甲復向東北斜行與乙相會二人共行了一千六百步甲南行不及斜行八十歩問城徑釋曰此通弦和和與股弦較立法測望乙東行為通勾甲南行為通股斜行與乙相會為通弦二人共行一千六百步通弦和和也甲南行不及斜行八十步股弦較也術曰四之股弦較以減弦和和餘自之得一百六十三萬八千四百股弦較自之得六千四百义十八因之得一十一萬五千二百相減餘一百五十二萬三千二百為平實四之弦和和得六千四百減十六較加十八較得六千五百六十為從四為隅法作負隅減從開平方法除之得勾股較二百八十加股弦較即勾弦較三百六十股弦較乘勾弦較倍為實平方開之得弦和較二百四十負隅減從開平方法見二卷通勾勾條甲乙同在乾隅甲南行乙東行隔城相望與城叅直甲向東北斜行與乙相會二人共行了一千六百步乙東行不及甲斜行三百六十步問城徑釋曰此通弦和和與勾弦較立法測望乙東行為通勾甲南行為通股斜行為通弦共行一千六百步通弦和和也乙東行不及甲斜行勾弦較也術曰倍較以較乘之得二十五萬九千二百又九之得二百三十三萬二千八百寄于左倍較以加和得二千三百二十倍較以減倍和得二千四百八十二數相減餘一百六十為泛率自之得二萬五千六百以減左位餘二百三十萬七千二百為平實十八因較得六千四百八十減四泛率得七千一百二十為從方四為隅筭作帶從負隅開平方法除之得二百八十為勾股較以減勾弦較餘八十為股弦較勾弦較乘股弦較倍之為實平方開之得弦和較帶從負隅開平方法見四卷底勾通弦條甲乙二人俱在乾隅甲南行乙東行遙相望與城相叅直甲復向東北斜行與乙相會二人共行了一千六百步乙東行不及甲南行二百八十步問城徑釋曰此通弦和和與勾股較立法測望乙東行為通勾甲南行為通股斜行與乙會為通弦共行一千六百步通弦和和也乙東行不及甲南行二百八十步勾股較也術曰併和較自之得三百五十三萬四千四百和較相減自之得一百七十四萬二千四百二數相併共五百二十七萬六千八百為平實四之和步得六千四百為從二為隅法作帶從負隅開平方法除之得六百八十為通弦減較得勾帶從負隅開平方法見四卷底勾通弦條甲乙二人俱在乾隅甲南行乙東行遙相望與城相叅直甲復向東北斜行與乙會二人共行一千六百步甲南行不及斜行與乙東行不及甲斜行共四百四十步問城徑釋曰此通弦和和與勾弦較股弦較併立法測望二人共步通弦和和也甲南行不及斜行為股弦較乙東行不及斜行為勾弦較共四百四十步勾弦較與股弦較併也術曰併和及二差併以三歸之即通弦甲乙二人俱在乾隅甲南行逺乙東行近遙相望與城相叅直既而甲復向東北斜行與乙會二人共行一千六百步甲南行不及斜行乙東行不及甲南行乙東行不及甲斜行三事共七百二十步問城徑釋曰此通弦和和與勾股較勾弦較股弦較并立法測望甲南行通股斜行通弦乙東行通勾共一千六百步通弦和和也乙東行不及甲南行為勾股較不及甲斜行為勾弦較甲南行不及斜行為股弦較三較相併共七百二十術曰三較和半之自乘又三之得三十八萬八千八百減弦和和餘三十八萬七千二百為平實倍弦和和半三較和五之二數相倂得五千為從二為隅算作負隅減從開平方法除之得股弦較八十負隅減從開平方見二卷通勾勾條通弦和和與别弦測望六甲丙二人俱在城外西北乾隅甲東行丙南行乙丁二人俱在城中心乙穿城往東門外丁穿城往南門外直行各不知步數而立四人遙相望俱與城相叅直既而丙向東北斜行與甲會甲東行與丙一南一斜共一千六百步丁亦從南門外立處斜行二百八十九步與乙會問城徑釋曰此通弦和和與皇極弦立法測望甲東行通勾丙南行通股斜行通弦共步弦和和也乙從城心出東門為皇極勾丁從城心出南門為皇極股丁斜行會乙則皇極弦也術曰以皇極弦乘通弦和和平方開之即通弦甲丙二人俱在城外西北乾隅甲東行丙南行乙出東門南行丁出南門東行各不知步數而立四人遙相望與城相叅直既而甲復斜行與丙會乙復斜行與丁會問其行步則曰甲一東一斜與丙之南共一千六百步乙斜行一百二步問城徑釋曰此通弦和和與太虛弦立法測望甲東行為通勾斜行為通弦丙南行為通股共步一千六百通弦和和也乙斜行與丁會即月之山太虚弦也術曰半乙斜行以乘甲丙共步得八萬一千六百為實以共步一千六百為從四為隅算作負隅減從翻法開平方法除之得三百四十為半通弦倍之以減弦和和餘九百二十為勾股和再減通弦即弦和較負隅減從翻法開平方曰置所得平實以從約之初商三百置一於左上為法置一隅因得一千二百為隅法以減從方餘四百為下法與上法相乘得一十二萬除實不足反減實八萬一千六百餘三萬八千四百為負積倍隅法得二千四百為亷法次商四十置一於左上為法置一隅因得一百六十為隅法併亷法共二千五百六十減從不足反減從一千六百餘九百六十為下法與上法相乘除實盡得半通弦三百四十後凡言負隅減從開平方法俱倣此測圓海鏡分類釋術卷七
