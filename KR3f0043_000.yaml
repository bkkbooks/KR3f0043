body:
  text: 測圓海鏡分類釋術天文算法類二算書之屬提要臣等謹案測圓海鏡分類釋術十卷明顧應祥撰應祥有人代紀要已著録李冶測圓海鏡所設一百七十問中皆有草有法按前數十題中甚易者或無草後皆有草草用立天元一為虛數合問數推之法専用問數推之皆歸于𢃄縱諸乘方而止應祥得治書于唐順之於立天元一語互相推求不得其解遂去其細草専演算法改為是書自謂便於下學殊不知立天元一之妙能使諸法不能求者可以得其法若無其草即冶已有不能得其法者而徒沾沾於加減開方之數可謂循枝葉而失本故唐順之與應祥書云此書形下之數太詳而形上之義或略使觀之者尚不免其數可陳而義難知有與人以鴛鴦枕而不度人以金針之疑僕意欲明公於緊要處提掇一二作法源頭出來使後世為數學者識其大者得其義識其小者得其數則此書尤更覺精采耳其不足於應祥誠是第作法源頭即立天元一一語應祥既去之又將何以為提掇乎然九章之中惟少廣諸乘方之數為甚繁故立方𢃄縱之法古已不見有和較者冶所用有至三乘方四乘方及五乘方者且兼加減諸乘方亷隅不為之詳其算式初學誠有難於取數者冶雖専為發明立天元一術得應祥所演諸乘方之式亦可為求立天元一法者之一助云乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
