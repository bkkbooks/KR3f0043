body:
  text: 測圓海鏡分類釋術卷六元李冶撰明顧應祥釋術勾與和測望一甲乙俱在城外西北乾隅甲南行不知步數而立乙東行三百二十步見之甲又斜行與相會計甲直行斜行共一千二百八十步問城徑釋曰此通勾與通股弦和測望乙東行通勾也甲直斜共行通股弦和也術曰勾自之得一十萬二千四百以和除之得八十為股弦較以較減和半之為股以勾股求容圓術求之得城徑又曰勾和各自乘相減為實倍和除之得股相併為實倍和除之得弦邉勾以下俱以類推即是乙出東門南行丙出南門東行各不知步數而立只云丙行多於乙步甲從乾隅東行三百二十步望乙丙與城相叅直計乙丙共行一百二步問城徑釋曰此以通勾與明勾股和測望甲東行通勾也乙出東門南行為股丙出南門東行為明勾共計一百二步明勾股和也術曰倍共步乘東行筭得二千八十八萬九千六百為立方實共步乘東行加東行筭得一十三萬五千四十為從方東行為從亷五分為隅算作帶從負隅以亷減從開立方法除之得全徑帶從負隅以亷減從半翻法開立方曰置所得實以從方約之初商二百置一於左上為法置一乘從亷得六萬四千以減從方存七萬一千四十為從置一自之得四萬以隅算五分因之得二萬為隅法併從共九萬一千四十為下法與上法相乘除實一千八百二十萬八千餘實二百六十八萬一千六百從方内再減六萬四千止餘七千四十為從三因隅法得六萬為方法三因初商得六百為亷法次商四十置一於左次為上法置一乘從亷得一萬二千八百以減餘從不及減反減餘從七千四十餘五千七百六十為負從置一乘亷法以隅因得一萬二千置一自之隅因得八百為隅法併方亷隅共七萬二千八百減去負從餘六萬七千四十為下法與上法相乘除實盡法已見四卷通勾太虚弦條因以五分為隅故重出又為帶從負隅以亷添積開立方法法見四卷通勾虚弦條下乙出東門東行丙出南門南行各不知步數而立甲從乾隅東行三百二十步望乙丙二人俱與城相參直計乙丙共行一百五十一步問城徑釋曰此以通勾與勾明股和立法測望甲東行通勾乙東行勾丙南行明股也術曰通勾自之得一十萬二千四百半之得五萬一千二百又自之得二十六億二千一百四十四萬為三乘方實以三百六十二乘半通勾筭得一千八百五十三萬四千四百為從方通勾乘和步得四萬八千三百二十為從一亷五之通勾得一千六百為從二亷二分五釐為常法作帶從方亷三乘方法開之得八十為小差小差者通股弦較也以減通勾即城徑帶從方亷負隅單位開三乘方曰置所得三乘方實以亷隅約之商得八十置一於左上為法置一乘從一亷得三百八十六萬五千六百置一自之以乘從二亷得一千二十四萬置一自乘再得五十一萬二千以二分五釐因之得一十二萬八千為隅法併從方一亷二亷隅法得三千二百七十六萬八千為下法與上法相乘除實盡東門外徃南有樹乙出東門徃東不知步數而立甲出北門東行二百步斜望乙與樹正與城相叅直既而乙復折而斜行至樹下與甲相望計乙直行斜行共五十步釋曰此以底勾與勾弦和立法測望甲出北門東行底勾也乙一直一斜勾弦也術曰底勾與和相減餘一百五十為差差加底勾復以差乘之得數半之得二萬六千二百五十差自之得二萬二千五百二數相減餘三千七百五十為實併勾和半之得一百二十五為法實如法而得一南門外往東不知步數有樹乙出南門南行不知步數而立甲出北門東行二百步見樹與乙與城相叅直乙復斜行至樹下與甲相望計乙一直一斜共二百八十八步問城徑釋曰此以底勾與眀股弦和立法測望甲出北門東行底勾也乙出南門南行明股也斜行明弦也術曰勾和相減餘半之得四十四為半差以減底勾餘一百五十六為汛率汎率自之又倍之得四萬八千六百七十二半差乘和步得一萬二千六百七十二二數相減餘三萬六千為實半底勾減和步得一百八十八倍汎率得三百一十二二數相併得五百為法實如法而一得明勾勾與較測望二甲乙俱在城外西北乾隅甲南行不知步數而立乙東行三百二十步見之甲又斜行與乙相㑹計甲直行不及斜行八十步釋曰此以通勾與股弦較測望乙東行通勾也甲直行不及斜行股弦較也術曰較除勾筭得一千二百八十為股弦和減較半之為股加較半之為弦邉勾以下俱即此類推股與和測望三甲乙二人俱在城外西北乾隅甲南行六百步而立乙東行不知步數見之又斜行與甲相㑹計乙直斜共行一千步問城徑釋曰此以通股勾弦和測望甲南行通股也乙直東行與斜行共勾弦和也術曰股自之得三十六萬和除之得三百六十為勾弦較減和半之為勾加和半之為弦邉股以下推此甲從乾隅南行六百步而立乙出南門直行丙出東門直行三人相望俱與城相叅直計其行步則乙與丙共行一百五十一步釋曰此以通股勾明股和立法測望甲行通股乙行眀股丙行勾也共之和也術曰通股為筭半而自之得三百二十四億為三乘方實倍和加通股以乘半通股筭得一億六千二百三十六萬為從方通股乘和步得九萬六百為從一亷通股加半股得九百為從二亷二分五釐為隅算作帶從方亷負隅以二亷減從翻法開三乘方法除之得三百六十為股圓差以減通股即圓徑帶從方亷負隅以二亷減從翻法開三乘方曰置所得三乘方實以從方亷隅約之初商三百置一於左上為法置一自之以乘二亷得八千一百萬以減從方餘八千一百三十六萬置一乘從一亷得二千七百一十八萬置一自乘再乘以隅算二分五釐因之得六百七十五萬為隅法併從方從一亷隅法共一億一千五百二十九萬為下法與上法相乘除實三百四十五億八千七百萬實不滿法反減實三百二十四億餘二十一億八千七百萬為負積四因隅法得二千七百萬為方法初商自之六因又以隅因之得一十三萬五千為上亷初商四之隅因之得三百為下亷商次位得六十置一於左次為上法倍初商加次商得六百六十以乘從二亷得五十九萬四千又併初次商得三百六十因得二億四千三百八十四萬以減餘從亦不及減反減從八千一百三十六萬餘一億三千二百四十八萬為負從置一倍初商加次商得六百六十以乘從一亷得五千九百七十九萬六千置一乘上亷得八百一十萬置一自之以乘下亷得一百八萬置一自乘再乘隅因之得五萬四千為隅法併方法從一亷上下亷隅法共九千六百三萬以減負從餘三千六百四十五萬與上次法除負積二十一億八千七百萬又為帶從方負隅以二亷添積開三乘方其法曰初商三百置一於左上為法置一自之以乘從二亷得八千一百萬與上法相乘得二百四十三億為益實加入原實共五百六十七億為實置一乘從一亷得二千七百一十八萬為益亷置一自乘再乘得二千七百萬以隅算二分五釐因之得六百七十五萬為隅法併從方從益亷隅法共一億九千六百二十九萬為下法與上法相乘除實五百八十八億八千七百萬實不滿法反除實五百六十七億餘二十一億八千七百萬為負積四因隅法得二千七百萬為方法初商自之六因又以隅因之得一十三萬五千為上亷初商四之隅因得三百為下亷次商六十置一於左次為上法置一倍初商加次商得六百六十又併初次商相因得三百六十得二十三萬七千六百又加初商自之九萬共三十二萬七千六百以乘從二亷得二億九千四百八十四萬與上次法六十相乘得一百七十六億九千四十萬減去負積存一百五十五億三百四十萬為實倍初加次共六百六十以乘從一亷得五千九百七十九萬六千為益從亷置一乘上亷得八百一十萬置一自之以乘下亷得一百八萬置一自乘再乘隅因得五萬四千為隅法併方法益亷上下亷隅法共九千六百三萬併從方共二億五千八百三十九萬為下法與上法相乘除實盡右開三乘方内俱帶翻法后如此類者倣此南門之東不知步數有樹乙出南門南行不知步數而立甲出西門南行四百八十步望乙與樹俱與城相叅直乙復斜行至樹下與甲相望計乙直行斜行共二百八十八步問城徑釋曰此以邉股及明股弦和立法測望甲出西門南行邉股也乙出南門直行明股斜行至樹明弦也共步明股弦和也術曰股和相減餘一百九十二為差加股復以差乘之折半得六萬四千五百一十二差自之得三萬六千八百六十四二數相減餘二萬七千六百四十八為實併股和半之得三百八十四為法實如法而一得明勾七十二以明勾股求圎徑東門外往南有樹乙出東門東行不知步數而立甲出西門南行四百八十步望樹與乙俱與城相叅直既而乙斜行至樹下與甲相望計乙直斜行共五十步釋曰此以邉股及勾弦和立法測望甲出西門南行邉股也乙直行勾斜行弦也術曰股和相併半之得二百六十五為汛率以汎率減邉股餘二百一十五自之得四萬六千二百二十五和步乘汎率得一萬三千二百五十半之得六千六百二十五二數相減餘三萬九千六百為平實以汎率減邉股六之得一千二百九十為從方作帶從開平方法開之得股三十𢃄從開平方法見一卷股與較測望四甲乙二人俱在城外西北乾隅甲南行六百步而立乙東行不知步數見之又斜行與甲相㑹計乙行直步不及斜三百六十步問城徑釋曰此以通股勾弦較測望甲南行通股也乙東行不及斜行勾弦較也術曰股自乘較除之得勾弦利減較半之為勾加較半之為弦邉股以下推此弦與和測望五甲乙二人俱在城外西北乾隅乙向南行不知步數而立甲向東行亦不知步數望見之遂斜行六百八十步與乙㑹計甲之東與乙之南共九百二十步問城徑釋曰此以通弦與勾股和測望甲斜行與乙㑹弦也甲之東為勾乙之南為股共步和也術曰倍弦筭與和筭相減餘為實平方開之得勾股較減和半之為勾加和半之為股邉弦以下推此甲從北門向東直行庚從西門穿城東行丙從西門向南直行壬從北門穿城南行四人遙相望悉與城相叅直只云甲丙相望處斜量六百八十步庚壬穿城共行了六百三十一步問城徑釋曰此通弦與邉勾底股和立法測望甲丙相望通弦也庚從西門穿城東行邉勾也壬從北門穿城南行底股也共步和也術曰共步自之得三十九萬八千一百六十一為和筭共步減相望處步餘自之得二千四百一為差筭差筭減和筭餘三十九萬五千七百六十為平實倍斜步加差四十九共一千四百九為從作帶從開平方法除之得全徑帶從開平方法見一卷甲乙二人共立於城外東北艮隅乙南行過城門而立甲東行望乙與城相叅直而止丙丁二人共立於城外西南坤隅丁向東過城門而立丙向南行望丁及甲乙悉與城相叅直丙復斜行六百八十步與甲相㑹計乙之南與丁之東共三百四十二步問城徑釋曰此通弦與大差勾小差股和立法測望乙從艮隅而南過城門而立山之艮小差股也以甲東行為勾丁從坤隅東行過城門而立坤之月大差勾也以丙南行為股丙斜行與甲相會通弦也乙丁直行共步大差勾與小差股和也術曰斜步共步相乘倍之得四十六萬五千一百二十為實斜步共步相減餘三百三十八為差倍斜行加差共一千六百九十八為從作帶從開平法除之得全徑帶從開平方法見前甲出東門東行乙出南門南行各不知步數相望與城相叅直甲復斜行二百八十九步與乙相㑹乙直行長甲直行短共計一百五十一步問城徑釋曰此以皇極弦勾明股和立法測望甲東行為勾乙南行為明股甲之斜行皇極弦也術曰斜行自之得八萬三千五百二十一為弦筭共步自之得二萬二千八百一為和筭和筭減弦筭餘六萬七百二十為實倍共步減斜行餘一十三步為從作帶從開平方法除之得全徑帶從開平方法見前甲乙二人同出東門甲東行乙南行丙丁二人同出南門丙南行丁東行各不知步數而立四人遙相望悉與城相叅直問其步數則曰甲丙共行了一百五十一步乙丁立處相距一百二步問城徑釋曰此太虛弦與勾明股和立法測望甲出東門直行為勾而乙南行為股丙出南門南行為明股而丁東行為勾甲丙共步勾明股和也乙丁相距太虚弦也術曰共步相距步相減餘四十九為差自之得二千四百一為差筭共步自之得二萬二千八百一為和筭差筭減和筭餘二萬四百為實倍距步减差餘一百五十五為從作以從減法開平方法除之得全徑以從減法開平方法見前又為以從添積開平方其法曰初商二百置一於左上為法置一乘從得三萬一千為益積添入原積共五萬一千四百為實置一為隅法與上法相乘除實四萬餘實一萬一千四百倍隅法得四百為亷法次商四十置一於左上為法置一乘從方得六千二百為益實添入餘積共一萬七千六百為實置一併亷法共四百四十為下法與上法相乘除實盡後凡言以從添積開平方法俱倣此岀南門向東有槐樹出東門向南有栁樹丙丁俱出南門丙直往南丁往東至槐樹下立甲乙俱出東門甲直往東乙往南至桞樹下立四人遙相望見各不知歩數只云丙丁共行了二百七步甲乙共行了四十六步其甲丙立處相距二百八十九步問城徑釋曰此以皇極弦與明勾股和勾股和立法測望槐在南門之東為南之月明勾也丁直行往南為日之南明股也共行二百七明勾股和也栁在東門之南為山之東股也甲直行往東為東之川勾也共行四十六步勾股和也甲丙立處相距為日川皇極弦也術曰二和相減餘以減相距餘半之得六十四為平勾以加二和相減為平股相乘為實平方開之即半徑又曰二和相併以減相距餘半之得一十八為汎率加明和為長加和為廣長廣相乘得半徑筭南門之東有槐東門之南有栁丙出南門直行丁出南門東至槐下甲出東門直行乙出東門南至栁下相望俱與城相叅直計丙南丁東共行二百七步甲東乙南共行四十六步其二樹相距一百二步問城徑釋曰此與前問同前以逺相距言此以近相距言近相距太虚弦也以太虚弦與明叀二和立法測望術曰叀和乘虚弦又自之得二千二百一萬四千八百六十四為平實併二和自之得六萬四千九為二和筭和自之得二千一百一十六為和筭明和自之得四萬二千八百四十九為明和筭併明和筭叀和筭以減二和筭餘一萬九千四十四為益隅作負隅開平方法除之得叀弦倍弦筭與和筭相減開其餘得叀勾股較加和半之為股減和半之為勾負隅開平方曰置所得平實以益隅約之初商三十置一於左上為法置一乘益隅得五十七萬一千三百二十為下法與上法相乘除實一千七百一十三萬九千六百餘實四百八十七萬五千二百六十四倍下法得一百一十四萬二千六百四十為亷法約次商得四置一於左上為法置一乘益隅得七萬六千一百七十六併入亷法共一百二十一萬八千八百一十六為下法與上法相乘除實盡此法已見一卷底勾弦條下因隅算多故重出又曰隅算除平實即得叀弦筭又曰明和乘虚弦又自之得四億四千五百八十萬九百九十六為平實如前法為負隅平方開之得明弦若以益隅除平實徑得明弦筭又術虚弦自之得一萬四百四為虚弦筭以叀和乘之得四十七萬八千五百八十四為平實倍明和得四百一十四為益隅開之得叀弦若以益隅除平實徑得叀弦筭虚弦自之以明和乘之得二百一十五萬三千六百二十八為平實倍叀和為益隅開之得明弦若以益隅除平實徑得明弦筭三位負隅開平方曰置平實四億四千五百八十萬九百九十六于左以益隅一萬九千四十四約之初商一百置一於左上為法置一於右下乘益隅得一百九十萬四千四百為下法與上法相乘除實一億九千四十四萬餘實二億五千五百三十六萬九百九十六倍下法得三百八十萬八千八百為亷法次商五十置一於左上為法置一乘益隅得九十五萬二千二百為隅法併亷法共四百七十六萬一千為下法與上次相乘除實二億三千八百五萬餘實一千七百三十一萬九百九十六倍隅法得一百九十萬四千四百併入亷法共五百七十一萬三千二百為亷法約三商得三置一於左為法置一右下乘益隅得五萬七千一百三十二為隅法併入亷法共五百七十七萬三百三十二為下法與上法相乘除實盡弦與較測望六甲丙二人俱在城外西北隅起程丙南行甲東行各不知步數隔城相望既而甲斜行六百八十步與丙相㑹問其東行步數則曰我少於丙南行二百八十步問城徑釋曰此通弦與通勾股較立法測望甲東行為勾丙南行為股甲少於丙步數勾股較也斜行弦也術曰弦自乘倍之得九十二萬四千八百較自乘得七萬八千四百相減餘八十四萬六千四百為實平方開之得勾股和九百二十加較半之為股减較半之為勾又曰弦較相減得四百為弦較較相併得九百六十為弦較和弦較較弦較和相乘得三十八萬四千為實倍較得五百六十為從二為隅筭作以從減法負隅開平方法除之得通股作帶從負隅開平方法除之得通勾帶從負隅開平方法見四卷底勾通弦條帶從負隅以從減隅開平方法見四卷大差勾黄長弦條下又為以從添積負隅開平方以六百乘從益實倍六百得一千二百為法即是邉弦以下類推乙出東門南行不知步數而立甲出西門直徃南行回望乙與城相叅直又斜行五百一十步與乙相㑹問乙行步則曰少於城徑二百一十步不知城徑㡬何釋曰此黄廣弦與叀股黄廣勾較立法測望乙出東門南行為叀股城徑即黄廣勾少於城徑即叀股黄廣勾較也斜行黄廣弦也術曰較自之得四萬四千一百為較筭以為實斜歩四之減二較餘一千六百二十為從五為隅算作負隅減從開平方法除之得叀股三十加較為黄廣勾即城徑負隅減從開平方法見二卷通勾叀勾條乙出南門東行不知步數而立甲出北門直徃東行望乙與城相叅直又斜行二百七十二歩與乙相㑹問乙東行步則曰少於城徑一百六十八步不知城徑㡬何釋曰此黄長弦與明勾黄長股較立法測望乙出南門東行為明勾城徑即黄長股少於城徑即明勾黄長股較也斜行黄長弦也術曰較自之得二萬八千二百二十四為實四斜行減二較餘七百五十二為從方五為隅算作負隅減從開平方法除之得明勾七十二加較為黄長股即城徑負隅減從開平方法見二卷測圓海鏡分類釋術卷六
