body:
  text: 測圓海鏡分類釋術卷一元李冶撰明顧應祥釋術圓城不知周徑四面居中開門城外四隅各有十字大街西北隅曰乾東北隅曰艮西南曰坤東南曰巽隨地逺近測望以知城徑通勾股求容圓一甲乙二人俱在城外西北隅乾地乙東行三百二十步甲南行六百步望乙與城相參直問城徑答曰城徑二百四十步釋曰此勾股求容圓徑也東行為通勾南行為通股以通勾股求通弦和較弦和較即容圓徑也術曰勾股相乘倍之為實勾股求弦併勾股為弦和和為法除之勾股求弦曰勾自之得一十萬二千四百為勾算股自之得三十六萬為股算併二算得四十六萬二千四百為弦算平方開之得弦六百八十併勾股得一千六百為弦和和後凡言勾股求弦者俱倣此甲乙二人俱在城西北隅乾地甲直南行不知步數而立乙直東行三百二十步望見乃斜行六百八十步與甲相㑹測城徑釋曰此勾弦求容圓徑也東行為通勾斜行為通弦術曰勾弦求股勾股相乘倍為實弦和和除之勾弦求股曰勾自乘得一十萬二千四百為勾算弦自乘得四十六萬二千四百為弦算相減餘三十六萬為股算平方開之得股又術勾弦較乘勾倍之得二十三萬四百為實倍較為從作帶從開平方法除之帶從開平方曰列實於左倍較得七百二十為從約初商得二百置一於左上為法置一為隅法帶從方共九百二十為下法除實一十八萬四千餘實四萬六千四百倍隅法得四百為廉法約次商得四十置一於左次為上法置一為隅法併從方廉法共一千一百六十為下法與上次法相乘除實盡後凡言帶從開平方法者俱倣此甲乙二人俱在城外西北乾隅甲東行不知步數而立乙南行六百步見之復斜行六百八十步與甲㑹測城徑釋曰此股弦求容圓也南行為通股斜行為通弦術曰股弦求勾以乘股倍之為實弦和和除之股弦求勾曰弦算減股算開其餘即勾後凡言股弦求勾者俱倣此又術股弦相減餘八十為股弦較相併得一千二百八十為股弦和以較乘和得一十萬二千四百即勾算平方開之得勾三百二十減較即城徑既有勾股求圓徑之法則勾弦求圓股弦求圓可以例見不必立法因原夲有此二問載於後卷故移附于此邊勾股求容圓二甲乙二人俱在城西門甲南行四百八十步乙穿城東行二百五十六步見之測城徑釋曰此勾上容圓也南行邊股也東行邊勾也以邊勾邊股求通圓術曰勾股相乘倍之得二十四萬五千七百六十為實勾股求弦得五百四十四併股共一千二十四為股弦和為法除之乙出東門直行不知步數而止甲出西門南行四百八十步見之乃斜行五百四十四步相㑹問城徑釋曰此邊股邊弦求邊勾以求通容圓也南行為邊股斜行為邊弦術曰股弦求勾以乘股得一十二萬二千八百八十為實半股弦和得五百一十二為法除之甲出西門南行不知步數而立乙穿城東行二百五十六步見之乃斜行五百四十四步相㑹問城徑釋曰此邊勾邊弦求邊股以求通圓徑也東行為邊勾斜行為邊弦術曰勾弦求股以乘勾半股弦和除之底勾股求容圓三甲乙二人俱在北門乙東行二百步而止甲穿城南行三百七十五步見之問城徑釋曰此股上容圓也東行為底勾南行為底股以底勾股求通圓術曰勾股相乘倍之為實勾股求弦以勾弦和為法除之乙出南門直行不知步數而立甲出北門東行二百步見之復斜行四百二十五步就乙問城徑釋曰此底勾底弦求底股以求通圓徑也東行為底勾斜行為底弦術曰弦算減勾算餘平方開之得股與勾相乘得七萬五千為實勾弦和為法除之得半徑又術倍勾弦較以乘勾算得一千八百萬為實四勾加倍較得一千二百五十為隅法作負隅開平方法除之得半徑負隅開平方法曰布實於左以隅法約初商一百置一於左上為法置一乘隅法得一十二萬五千為隅法與上法相乘除實一千二百五十萬餘實五百五十萬倍隅法得二十五萬為廉法約次商得二十置一於左次為上法置一乘隅算得二萬五千併廉法共二十七萬五千為下法與上法相乘除實盡後如此類者倣此問底股弦求通圓徑術曰弦算減股算開其餘得勾如前法求之皇極勾股求容圓四甲乙二人俱在城中心立乙穿城東行一百三十六步甲穿城南行二百五十五步望見問城徑釋曰此勾股上容圓以半圓勾股求全圓徑也東行皇極勾也南行皇極股也術曰勾股相乘倍之為實勾股求弦為法實如法而一得全徑皇極勾弦求圓股弦求圓止以勾弦求股股弦求勾依上推之不必立法大差勾股以下倣此通勾股折中弦上求圓五甲乙二人俱在城西北隅乾地乙東行一百八十步斜視城中有塔甲南行三百六十步與乙斜對視塔正居城徑之半問城徑釋曰此弦上容圓也東行為勾南行為股此以勾股求半容圓徑即勾股容方術術曰勾股相乘為實相併為法實如法而一得半徑大差勾股求容圓六甲乙二人俱在城外西南隅坤地乙東行一百九十二步甲南行三百六十步望乙與城參直問城徑釋曰此勾外容圓也東行大差勾也南行大差股也術曰勾股相乘倍之得一十三萬八千二百四十為實勾股相減餘一百六十八為勾股較勾股求弦得四百八併較共五百七十六為弦較和以為法除之得全徑小差勾股求容圓七甲乙二人俱在城外東北隅艮地甲南行一百五十步而止乙東行八十步望乙與城參直問城徑釋曰此股外容圓也東行小差勾也南行小差股也術曰勾股相乘倍之得二萬四千為實相減餘七十為較勾股求弦得一百七十減較餘一百為弦較較以為法除之得全徑太虛勾股求容圓八甲乙二人俱在城外東南隅巽地乙西行四十八步而止甲北行九十步望乙與城參直問城徑釋曰此弦外容圓也西行即太虛勾北行即太虛股以太虛勾股反而內向求圓故曰弦外容圓術曰勾股相乘倍之得八千六百四十為實相併得一百三十八為勾股和勾股求弦得一百二以減和餘三十六為弦和較以為法除之得全徑明勾股求容圎九甲乙二人俱在南門乙東行七十二步而止甲南行一百三十五步望乙與城參直問城徑釋曰此勾外容半圓也東行為明勾南行為明股術曰勾股相乘倍之得一萬九千四百四十為平實勾股求弦得一百五十三減勾餘八十一為勾弦較以為法除之勾股求容圓十甲乙二人俱在東門甲南行三十步而止乙東行一十六步望甲與城相參直問城徑釋曰此股外容半圓也南行為股東行為勾術曰勾股相乘倍之為實勾股求弦以股弦較為法除之或問黃廣勾股黃長勾股無求圓之法何也曰黃廣之勾黃長之股即圓徑也故不立法曰上下高勾股上下平勾股何以不立法曰上高去城逺下高與上平俱不當城半下平亦不附城故不立法測圓海鏡分類釋術卷一
