body:
  text: 測圓海鏡分類釋術卷十元李冶撰明顧應祥釋術和較參互帶分測望圓城甲乙二人俱在城外西北乾隅甲東行丙南行各不知步數而立相望與城相叅直丙復斜行七百八十步與甲會以甲東行步除丙南行得二步四分釋曰此弦與勾除股數立法測望斜行七百八十步弦也二步四分乃以勾除股所得之數術曰斜步自之得六十萬八千四百為平實以二步四分自之得五步七分六釐加一步得六步七分六釐為隅算平方開之得三百為勾勾弦求股得七百二十甲乙二人俱在城外西北乾隅甲南行不知步數而立乙東行隔城見之甲復斜行與乙相會告乙曰我直行斜行共行了一千二百八十步汝東行步居我南行步十五分之八釋曰此通股弦和與通勾股相較分立法測望乙東行為通勾甲南行為通股斜行為通弦共行通股弦和也乙東行既居甲南行十五之八是股得十五勾得八術曰股弦和自之得一百六十三萬八千四百又以十六因之得二千六百二十一萬四千四百為實以二百五十七因和步得三十二萬八千九百六十為益從以一十六為隅算作減從負隅開平方法除之得股弦較八十加和半之為弦減和半之為股負隅減從開平方法見二卷又曰勾居股十五分之八宜以八為勾率十五為股率各自乘併為實平方開之得一十七為弦率併股弦率得三十二為法置和步一千二百八十為實置二位一位以股率乘之以法除之得六百為股一位以弦率乘之以法除之得六百八十為弦此差分之法簡易明白甲乙二人俱在城外西北乾隅乙直徃南行不知步數而立甲往東行見之甲復斜行與乙會甲云我直斜共行了一千步東行得汝南行十五分之八釋曰此通勾弦和與通勾股相較分立法測望甲東行為勾斜行與乙會為弦乙南行為股術曰和步自之得一百萬為和筭分母自之得二百二十五以乘和筭得二億二千五百萬為實分母併分子以分母乘之加入分子得三百五十三倍之得七百六以乘共步得七十萬六千為益從分母自之得二百二十五為隅法作負隅減從開平方法除之得三百六十為勾弦較以較減和得勾負隅減從開平方法見二卷又曰勾居股十五之八就以八為勾率十五為股率勾股求弦得一十七為弦率併勾弦二率共二十五為法以和一千為實副置二位一位以勾率乘之以法除之得勾一位以弦率乘之以法除之得弦甲乙二人俱在城外西北乾隅甲南行不知步數而立乙東行亦不知步數望見之又斜行與甲相㑹乙云我東行不及城周九分之五甲云我南行多與汝東行二百八十步問城徑釋曰此通勾股較與通勾城周相較分數立法測望乙東行通勾甲南行通股南行多與乙東行為勾股較乙東行不及城周九分之五則城周得九通勾得四術曰東行步少城周九分之五則城徑得三東行得四四勾股較得一千一百二十為實城徑得東行四分之三以四為分母分母自之得一十六於上分母減子餘一倍之得二以分母減子乘之仍得二以減上倍餘一十四為法除實得八十為一分之數二之為城徑四之為勾加較即股甲出西門南行不知步數而立乙出北門東行見之乙云我東行居城徑六分之五甲云我南行多於乙二百八十步問城徑釋曰此底勾邉股較與底勾城徑相較分數立法測望乙出北門東行為底勾甲出西門南行為邉股多於乙行步為勾股較乙東行居城徑六分之五為底勾城徑相較步數術曰四之較步得一千一百二十為實分母自之得三十六於上半之分母減分子得二倍之得四又以減子餘二乘之得八以減上位餘二十八為法除實得四十為一分之數五之為東行六之為城徑甲乙二人俱在城外西北乾隅乙南行不知步數而立甲東行不知步數見之問其行步則甲乙共行了九百二十步問城徑居乙南行四十分之一十六釋曰此通勾股和與通股城徑較分數立法測望甲東行為通勾乙南行為通股共行九百二十為勾股和城徑得南行四十分之十六為通股城徑相較分數術曰以分子減母餘倍之得四十八以乘共行得四萬四千一百六十為實分子減母倍之以乘母子和得二千六百八十八子自之得二百五十六相併得二千九百四十四以為法實如法而一得一十五為一分之數又曰列四十與一十六以約分法約之城徑得南行五分之二分母減子餘三倍之得六以乘共行得五千五百二十為實分母減子倍之以乘母子併得四十二分子自之得四相併得四十六為法除實得一百二十為一分之數五之為通股二之為城徑約分法曰副置分母子以少減多得八為等八除分母得五除分子得二甲乙二人俱在城中心甲穿城往南不知步數乙出東門不知步數見之復斜行與甲會計其行乙東行較甲南行得十五分之八乙斜行減甲南行餘三十四減乙東行餘一百五十三步問城徑釋曰此皇極勾弦較股弦較與皇極勾股較分數立法測望甲南行為皇極股乙東行為皇極勾斜行為皇極弦斜行減南行餘三十四股弦較也斜行減東行餘一百五十三勾弦較也東行得南行十五分之八勾股較分數也術曰二餘數相乘得五千二百二倍之得一萬四百四平方開之得一百二復加二餘得二百八十九自之得八萬三千五百二十一於上又以二餘數相減餘一百一十九自之得一萬四千一百六十一以減上位餘六萬九千三百六十為實分母子相乘得一百二十倍之得二百四十為隅算作負隅開平方法除之得一十七為一分之數八之為勾十五之為股各加餘步得弦甲出西門南行乙出北門東行各不知步數相見復相向斜行各三百四十步相會甲云城徑居我南行二分之一乙云我東行居城徑六分之五問城徑釋曰此通弦與底勾城徑較分數邉股城徑較分數立法測望甲出西門南行為邉股乙出北門東行為底勾斜行各三百四十步共為通弦城徑居南行二分之一邉股城徑較分數也東行居城徑六分之五底勾城徑較分數也術曰併斜行自之得四十六萬二千四百為實即弦筭東行居城徑六分之五城徑得南行二分之一是城徑為六東行為五南行為十二半城徑加南行為十五自之得二百二十五半城徑加東行為八自之得六十四相併得二百八十九為隅算作負隅平方開之得四十為一分之數十二之為邉股五之為底勾六之為城徑負隅開平方法見一卷甲出西門南行不知步數而立乙出北門東行不知步數見之又斜行與甲會二人共計行一千三百六十步南行得斜行十七分之十二東行得斜行一十七分之五問城徑釋曰此邉股底勾通弦和與底勾通弦較分數邉股通弦較分數立法測望甲出西門南行為邉股乙出北門東行為底勾斜行與甲會為通弦共行一千三百六十邉股底勾通弦和也東行得斜行十七分之五底勾通弦較分數也南行得斜行十七分之十二邉股與通弦較分數也術曰此用差分法各列置衰弦十七股十二勾五副併得三十四為法置共步一千三百六十為實以十七因之以法除之得通弦以十二因之以法除之得邉股以五因之以法除之得底勾求城徑用底勾邉股求容圓法甲出西門南行不知步數而立乙出北門東行見之既而乙謂甲云我取汝六分之五得六百步甲謂乙云我取汝五分之三亦六百步釋曰此底勾邊股錯揉立法測望甲出西門南行為邊股乙出北門東行為底勾術曰此法用方程術以乙取甲分母六乘六百步得三千六百甲取乙分母五乘六百步得三千乙取甲六分之五是五箇甲行六箇乙行也甲取乙五分之三是五箇甲行三箇乙行也置甲五乙六三千六百步於右甲五乙三三千步於左以右甲五互乘左乙三得一十五左甲五互乘右乙六得三十二正相减餘一十五為法右甲五互乘左三千得一萬五千左甲五互乘右三千六得一萬八千相减餘三千為乙行之實右乙六互乘左三千得一萬八千左乙三互乘右三千六百得一萬八百相减餘七千二百為甲行之實法除乙實得乙行二百步法除甲實得甲行四百八十步二行步相併自之得四十六萬二千四百於上二行各自之甲得二十三萬四百乙得四萬相併得二十七萬四百以减上位餘一十九萬二千為實二行相併得六百八十為從方半步為隅算作負隅帶從開平方法除之得全徑負隅𢃄從開平方法見四卷底勾通弦條又曰二行相乘得九萬六千為實相併得六百八十為從作𢃄從開平方法除之得半徑𢃄從開平方法見前卷甲從城外西南坤隅往南不知步數而立乙從城外東北艮隅往東望見之既而乙謂甲云我取汝所行三分之一得二百步甲謂乙云我减汝所行四分之三得三百步問城徑釋曰此大差股小差勾錯揉立法測望甲從坤隅南行為大差股乙從艮隅東行為小差勾術曰此用方程術先以甲取乙分三乘二百步得六百步乃三箇乙行一箇甲行也又以乙减甲分母四乘三百步得一千二百乃四箇甲行内減三箇乙行也置甲一乙三六百步於右甲四乙三一千二百步於左以右甲一互乘左乙三仍得三左甲四互乘右乙三得一十二一正一負相併得一十五為法以右甲一互乘一千二百如舊左甲四互乘六百得二千四百相減餘一千二百為乙行之實右乙三互乘一千二百得三千六百左負乙三互乘六百得一千八百正負相併得五千四百為甲行之實法除乙實得乙行八十法除甲實得甲行三百六十求城徑以二行相乘倍之得五萬七千六百平方開之甲乙二人俱在城外西北乾隅甲南行不知步數而立乙東行不知步數見之問其行步則甲南行與城徑相較其餘步居南行五分之三乙東行與城徑相較其餘步居東行四分之一又云二餘步相減餘二百八十步問城徑釋曰此股圓差與股較分數勾圓差與勾較分數及股圓差勾圓差較立法測望甲南行為通股城徑相較餘步為股圓差股圓差居股五分之三乙東行為通勾城徑相較餘步為勾圓差勾圓差居勾四分之一二差相減餘二百八十步為股圓差與勾圓差相較也術曰倍二餘步相減數得五百六十步為實勾母乘股子減股母得七為法除之得勾圓差八十三之為城徑四之為勾甲乙二人俱在城外西北乾隅甲南行乙東行各不知步數相望問其行步但云甲南行與城徑相較餘步居南行步五分之三乙東行與城徑相較餘步居東行步四分之一又記得東行分母每分不及南行每分四十步問城徑釋曰此亦股圓差與股較分數勾圓差與勾較分數及二差分母相較數立法測望甲南行為股城徑不及股步為股圓差差得股五分之三乙東行為勾城徑不及勾步為勾圓差差得勾四分之一勾分母與股分母相較得四十也術曰置少步倍之得八十為實以股母子相減得二勾母子相減得三相減餘一為法除之仍得八十為勾圓差三之為城徑四之為勾求股圓差以勾圓差加少步四十得一百二十為一分二之為城徑三之為股圓差五之為股甲出南門直行不知步數而立乙出東門直行見之甲云我行不及股圓差二十四分之一十五乙云我行不及勾圓差五分之四又云甲直行多於乙直行一百一十九步二差相較二百八十步問城徑釋曰股圓差三百六十通股與圓徑較也甲出南門直行為明股明股與股圓差相較不及二十四分之一十五勾圓差八十通勾與圓徑相較也乙出東門直行為勾勾與勾圓差相較不及五分之四甲行多於乙行一百一十九步明股勾較也二差相較二百八十步勾圓差不及股圓差數也測圓海鏡分類釋術卷十
