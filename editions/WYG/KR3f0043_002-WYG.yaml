body:
  text: 測圓海鏡分類釋術卷二元李冶撰明顧應祥釋術兩勾求容圓一凡七條圓城不知周徑甲從城外西北隅乾地東行三百二十步乙從城外西南隅坤地東行一百九十二步見之問城徑釋曰甲東行通勾也乙東行大差勾也此以城南北長短二勾求城徑與通股小差股同法術曰二行相乗倍為實相併為法除之乙出南門東行七十二步甲從城外西北乾隅東行三百二十步見之問城徑釋曰甲東行通勾也乙東行明勾也此以城北大勾與城南半勾求城徑與通股股同法術曰二行相乗得二萬三千四十為實以乙行步七十二為從方作帶從開平方法除之得半徑帶從開平方法見一卷乙出東門直行一十六步而止甲從城外乾隅東行三百二十步望乙與城相叅直問城徑釋曰甲東行通勾也乙東行勾也此以城北大勾與城東小餘勾求城徑術曰甲行内減二之乙行餘二百八十八以乘甲行得九萬二千一百六十為平實四之甲東行減二之乙東行餘一千二百四十八為從方四為隅法作負隅減從開平方法開之得半徑負隅減從開平方曰布實于左從于右約初商得一百置一於左上為法置一隅因得四百為隅法以減從方餘八百四十八為下法與上法相乘除實八萬四千八百餘實七千三百六十倍隅法得八百為廉法約次商得二十置一於左次為上法置一隅因得八十為隅法併廉法共八百八十以減原從餘三百六十為下法與上次法相乘除實盡後凡言負隅減從開平方法者俱倣此乙出南門折東行七十二步而止甲出北門折東行二百步見之問城徑釋曰甲從北門東行底勾也乙從南門東行明勾也此以城北半大勾城南半短勾求半城徑術曰二行相乘得半徑筭平方開之與邊股股同法如乙出南門東行二十步甲出北門東行七百二十步術同乙從城外西南坤隅東行一百九十二步而止甲出北門東行二百步見之問城徑釋曰甲從北門東行底勾也乙從坤隅東行大差勾也此以城北半大勾城南全短勾求城徑與邊股小差股同法術曰二行相乘得三萬八千四百為實以甲東行二百為從作帶從開平方法除之得半徑帶從開平方法見一卷乙出東門直行一十六步甲出北門東行二百步望乙與城叅直問城徑釋曰甲行底勾也乙出東門直行勾也此以城北半大勾城東小餘勾求城徑術曰二行相減餘一百八十四為底勾勾較乙東行自之得二百五十六為勾筭較自之得三萬三千八百五十六減勾筭得三萬三千六百為實倍甲東行得四百為從方作減從開平方法除之得半徑減從開平方法曰布實於左從於右約初商一百置一於左上為法置一為隅法以減從方餘三百為下法與上法相乘除實三萬餘實三千六百倍隅法得二百為廉法約次商得二十置一於左次為上法置一為隅法併廉法共二百二十以減原從餘一百八十為下法與上法相乘除實盡或於初商除實三萬訖於從内再減一百餘二百為從方次商二十於餘從内減二十餘一百八十為下法亦通後凡言減從開平方法者俱倣此乙出東門直行一十六步甲出南門東行七十二步望乙與城相叅直問城徑釋曰甲行明勾也乙之直行勾也此以城南半勾與城東餘勾求城徑術曰二行相減餘五十六為明勾勾較自之得三千一百三十六為較筭東門直行自之得二百五十六為勾筭二筭相減餘二千八百八十為平實倍明勾得一百四十四為從作減從翻法開平方開之得半徑減從翻法開平方曰布實於左從於右約初商得一百置一於左上為法置一為隅法以減從方餘四十四為下法與上法相乘應除實四千四百實不滿法就於應除數内反減實二千八百八十餘一千五百二十為負積倍初商得二百為廉法約次商得二十置一於左次為上法置一為隅法併廉法共二百二十從不及減反減從一百四十四餘七十六為下法與上次法相乘除實盡或於初商反減實二千八百八十餘一千五百二十為負積又以初商一百反減餘從四十四餘五十六為負從次商二十併負從共七十六為下法亦通後凡言減從翻法開平方者俱倣此兩股求容圓二凡七條乙出南門直行一百三十五步而立甲從城外西北乾隅南行六百步望乙與城相叅直問城徑釋曰甲從乾隅南行通股也乙出南門直行明股也此以城西大股與城南餘股求城徑與通勾勾同術曰甲行内減二乙行餘三百三十以乘甲行得一十九萬八千為實三甲行内減二乙行餘一千五百三十為從方作帶從開平方法除之得半徑法見一卷乙出東門南行三十步甲從乾隅南行六百步見之問城徑釋曰甲南行為通股乙出東門南行三十步為股此以西大股與東短股求城徑通勾明勾同法術曰二行相乘得一萬八千為實以乙南三十為從作帶從開平方法除之得半徑法見一卷乙居城外東北艮隅南行一百五十步甲從城外西北南行六百步望乙與城叅直問城徑釋曰甲南行通股也乙從艮隅南行小差股也此以城西長股與城東短股求城徑與通勾大差勾同法術曰二行相乘倍之得一十八萬為實相併得七百五十為法除之得全徑甲出西門南行四百八十步而止乙出東門南行三十步望乙與城叅直問城徑釋曰甲出西門南行四百八十步邊股也乙出東門南行三十步股也此以城西半股與城東短股求圓徑俗云半􅀈梯與底勾明勾同法術曰二行相乘得半徑筭平方開之甲出西門南行四百八十步而立乙從城外東北艮隅南行一百五十步見之問城徑釋曰甲南行邊股也乙從艮隅南行小差股也此以城西南半股與城東北半股求圓徑與底勾大差勾同法術曰二行相乘得七萬二千為實以甲南行四百八十為從方作帶從開平方法除之得半徑帶從開平方法見一卷甲出西門南行四百八十步乙出南門直行一百三十五步相望與城叅直問城徑釋曰甲南行邊股也乙出南門直行明股也此以城西大半股與城南餘股求圓徑底勾勾同法術曰二行相減餘自之得一十一萬九千二十五為差筭乙行自之得一萬八千二百二十五為明股筭以減差筭餘一十萬八百為實倍甲行得九百六十為益從作減從開平方法除之得半徑法見前乙出東門南行三十步而立甲出南門直行一百三十五步望乙與城叅直問城徑釋曰乙出東門南行股也甲直行明股也此以城中餘股與城東小股求圓徑明勾勾同法術曰二行相減餘自之得一萬一千二十五為差筭甲直行自之得一萬八千二百二十五為明股筭減差筭餘七千二百為正實倍乙行得六十為從方作以從減法開平方法除之得半徑以從減法開平方曰布實于左從于右約初商得一百置一於左上為法置一於右下為隅法以從減隅餘四十為下法與上法相乘除實四千餘三千二百為實倍隅法得二百為廉法約次商得二十置一於左次為上法置一為隅法併廉法共二百二十減去從方餘一百六十為下法與上次法相乘除實盡後凡言減法開平方者俱倣此又為添積帶從開平方法初商一百置一於左上為法置一於右下為隅法對上法相乘得一萬為益實添入積内共一萬七千二百為實置一帶從得一百六十為下法與上法相乘除實一萬六千餘一千二百為實倍隅法得二百為廉法約次商得二十置一於左次為上法置一為隅法併廉法共二百二十與上次法相乘得四千四百為益實添入餘積共五千六百為實置一併廉法從方共二百八十為下法與上次法相乘除實盡又術明股筭減差筭餘七千二百為實六之股得一百八十為從方作減從翻法開平方法開之得半徑減從翻法開平方法見前條兩弦求容圓三城南有槐一株城東有栁一株甲出北門東行丙出西門南行甲丙槐栁悉與城相叅直既而甲斜行四百二十五步至槐下丙斜行五百四十四步至栁下問城徑釋曰甲斜行向西南至槐樹下底弦也丙斜行向東北至栁樹下邊弦也此以邊弦底弦互測圓徑術曰二斜行相減餘自之得一萬四千一百六十一為差筭甲斜行自之得一十八萬六百二十五為底弦筭二筭相減餘一十六萬六千四百六十四為平實倍邊弦得一千八十八為從方作帶從開平方法開之得一百三十六為平弦帶從開平方法見一卷出城南門之東有槐甲出北門東行斜望槐樹與城叅直乃斜行二百七十二步至槐下休止東門之南有栁丙出西門南行斜望栁樹亦與城相叅直乃斜行五百一十步至栁下休止問城徑釋曰槐在南門東七十二步明勾也甲出北門東行二百步望見槐與城相叅直此底勾也斜行至槐下黄長弦也栁在東門之南三十步股也丙出西門南行四百八十步望栁與城叅直邊股也斜行至栁樹下黄廣弦也此以黄長黄廣二弦立法測望術曰半甲斜行自之得一萬八千四百九十八為黄廣弦半筭半丙斜行自之得六萬五千二十五為黄長弦半筭併二行折半自之得一十五萬二千八百八十一以二筭減之餘六萬九千三百六十為實併二行共七百八十二為從作減從開平方法開之得一百二為太虚弦減從開平方法見二卷底勾勾條東門之南有栁南門之東有槐俱不知步甲出東門直行乙出南門直行立定二人相望視槐栁與城相叅直既而甲斜行三十四步至栁下乙斜行一百五十三步至槐下問城徑釋曰此明弦弦立法測望甲斜行至栁為弦乙斜行至槐為明弦術曰二弦相乘倍得一萬四百四平方開之得太虚弦加弦即皇極勾加明弦即皇極股以皇極勾股求之得城徑皇極勾股求容圓見一卷測圓海鏡分類釋術卷二
