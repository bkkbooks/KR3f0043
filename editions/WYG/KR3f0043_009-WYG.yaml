body:
  text: 測圓海鏡分類釋術卷九元李冶撰明顧應祥釋術諸較參互立法丙出南門直行甲出東門直行各不知步數相望與城相叅直問其行步甲云我東行少於城徑二百二十四步丙云我南行少於城徑一百五步問城徑釋曰此明股城徑較與勾城徑較立法測望甲出東門直行勾也丙出南門直行明股也術曰二少步相乘又自之得五億五千三百一十九萬四百為三乘方實二少步相乘得二萬三千五百二十六之共步得一千九百七十四二數相乘得四千六百四十二萬八千四百八十為從方以五十六萬二千五百二十為從一亷四十八之共步得一萬五千七百九十二為從二亷六十三為隅法作帶從亷隅添積開三乘方法除之得半城徑帶從方一亷添積以二亷為法開三乘方曰置所得三乘方實以從方從亷隅法約之初商一百置一於左上為法置一乘從一亷得五千六百二十五萬二千為益亷置一自乘再乘以隅算因得六千三百萬為隅法併從方益亷得一億六千五百六十八萬四百八十以初商因之得一百六十五億六千八百四萬八千為益積添入原積共一百七十一億二千一百二十三萬八千四百為通實置一自之以乘從二亷得一億五千七百九十二萬為下法與上法相乘除實一百五十七億九千二百萬餘一十三億二千九百二十三萬八千四百為次商之實二因益亷得一億一千二百五十萬四千為從一亷之方三因從二亷得四億七千三百七十六萬為從二亷之方三之初商以乘元從二亷得四百七十三萬七千六百為從二亷之亷四因隅法得二億五千二百萬併從方共二億九千八百四十二萬八千四百八十為方法初商自之六因又隅因之得三百七十八萬為上亷初商四之隅因得二萬五千二百為下亷次商二十置一於左上為法置一乘原從一亷得一千一百二十五萬四百為從一亷之亷併從一亷之方共一億二千三百七十五萬四千四百為益亷之實置一乘上亷得七千五百六十萬置一自之以乘下亷得一千八萬置一自乘再乘得八千隅因得五十萬四千為隅法併方上下亷隅共三億八千四百六十一萬二千四百八十又加益亷之實得五億八百三十六萬六千八百八十以次商因之得一百一億六千七百三十三萬七千六百為益實加入次實得一百一十四億九千六百五十七萬六千為通實置一乘從二亷之亷得九千四百七十五萬二千置一自之以乘從二亷得六百三十一萬六千八百為從二亷之隅併從二亷之方亷隅共五億七千四百八十二萬八千八百為下法與上法相乘除實盡丙出南門東行甲出東門南行各不知步數相望俱與城相叅直丙云我東行不及城徑一百六十八步甲云我南行不及城徑二百一十步問城徑釋曰此明勾與城徑較與股城徑較立法測望丙出南門東行為明勾甲出東門南行為股術曰二不及相減餘四十二為差自之得一千七百六十四為差筭半甲不及自之得一萬一千二十五半甲不及減差餘六十三自之得三千九百六十九二數相併内減差筭得一萬三千二百三十為平實二之内不及得三百三十六為益從三步半為隅法作帶從負隅開平方法除之得股三十帶從負隅開平方法見四巻底勾通弦甲乙二人俱在城外西北乾隅甲東行乙南行丙出東門南行丁出南門東行各不知步數而立四人遙相望與城相叅直問其行步則甲東多於丁東二百四十八步乙南多於丙南五百七十步問城徑釋曰此通勾明勾較與通股股較立法測望甲從乾隅東行為通勾丁從南門東行為明勾甲多於丁步通勾明勾較也丙出東門南行為股乙自乾隅南行為通股乙多於丙步通股股較也術曰二較相乘得一十四萬一千三百六十為實併二較半之得四百九為從以七分半為隅法作帶從負隅開平方法除之得全徑帶從負隅開平方法見前甲乙二人俱在城外西北乾隅甲東行乙南行丙從城外西南坤隅東行丁從城外東北艮隅南行各不知步數四人遙相望俱與城相叅直問其行步則曰甲東行多於丙東行一百二十八步丁南行不及乙南行四百五十步問城徑釋曰此通勾大差勾較與通股小差股較立法測望甲從乾隅東行為通勾丙從坤隅東行為大差勾甲多一百二十八步即為通勾大差勾較與黄長勾同乙從乾隅南行為通股丁從艮隅南行為小差股丁不及乙四百五十步為通股小差股較與黄廣股同術曰二較相乘即城徑筭南門迤東有槐一株東門迤南有栁一株甲乙二人俱在城外西南坤隅甲直往南不知步數而立乙往東徑過南門至槐下立丙丁二人俱在城外東北艮隅丙直往東不知步數而立丁往南徑過東門至栁下立四人遙相望俱與城相叅直問其行步則甲多於乙一百六十八步丙少於丁七十步問城徑釋曰此大差勾股較與小差勾股較立法測望甲從坤往南之天為大差股乙往東至槐下為大差勾甲多一百六十八步大差勾股較也丙從艮隅往東之地為小差勾丁往南至栁下為小差股丙不及丁七十步小差勾股較也術曰二較相乘得一萬一千七百六十為實相減半之得四十九為法實如法而一得全徑甲從坤隅東行過南門不知步數而立乙從艮隅南行過東門不知步數見甲而止甲乃斜行一百二步與乙會乙曰我南行不及汝東行四十二步問城徑釋曰此大差勾小差股較與太虚弦立法測望甲從坤隅東行乃坤之月為大差勾乙從艮南行乃艮之山為小差股不及四十二步為大差勾與小差股較也斜行一百二步太虛弦也術曰以較減弦餘六十以乘弦較併半之得四千三百二十為實以較四十二為從作帶從開平方法除之得虚勾四十八又曰大差勾減小差股即太虛較也弦自乘倍之與較自乘相減餘為實平方開之得勾股和加較半之為股減較半之為勾圓城南門外正南有塔一座南門之東有槐樹一株東門外正東有望竿一根東門之南有栁樹一株甲乙二人俱在城中心甲南行出城直至塔下立乙東行出城至望竿下立丙丁二人俱在城外西南坤隅丙南行不知步數而立丁東行至槐樹下立戊己二人俱在城外東北艮隅戊東行不知步數而立己南行過東門南栁樹下立六人遙相望俱與城相叅直既而甲斜行至東門外望竿下與乙相會丙斜行經過塔直至南門東槐樹下與丁相會戊斜行向西南至東門之南栁樹下與己相會問其行步則曰以丁東行減丙南行又與丙斜行相較餘步比甲斜行少四十九步以戊從艮隅東行減己從艮隅南行至栁餘步與戊斜行至栁步數相併内減槐栁斜相距步餘一百三十八步其乙東行比甲南行至塔却少一百一十九步問城徑釋曰此大差弦較較與皇極弦較小差弦較和與太虚弦較并皇極勾股較立法測望甲從城中心出南門至石塔下乃日之心為皇極股乙從城中心出東門至望竿下乃心之川為皇極勾甲斜行與乙會乃日之川為皇極弦丙從坤隅南行不知步數而立乃天之坤為大差股丁從東行至槐樹下乃坤之月為大差勾丙斜行與丁會乃天之月為大差弦丁東行減丙南行為大差勾股較又與丙斜行相較為大差弦較較不及甲斜行四十九步是大差弦較較與皇極弦較也戊從艮隅東行乃艮之地為小差勾己從艮隅南行至栁樹下乃山之艮為小差股戊斜行至栁下與己會乃山之地為小差弦戊東行減己南行為小差勾股較又與戊斜行相併為小差弦較和槐栁斜相距步即太虛弦以減小差弦較和餘一百三十八步是小差弦較和與太虛弦較也乙東行不及甲南行一百一十九步為皇極勾股較也術曰併二較自之得三萬四千九百六十九皇極較自之得一萬四千一百六十一相減餘二萬八百八為實二為隅算平方開之得太虚弦一百二加小差弦較和與虚弦相較之數即城徑負隅開平方法見一卷底勾底弦條南門外不知步數有槐東門外不知步數有桞甲乙俱在乾隅甲東行遇一小塔而立乙南行遇一大石塔而立二人遙相望槐栁俱與城相叅直計其行步則乙南行不及二塔斜相距步數少於小塔與栁相距五十六步甲東行不及二塔斜相距步數多於大塔與槐相距一百五步問城徑釋曰此通股弦較與下平弦較通勾弦較與上高弦較測望二塔相距通弦也丙南行通股不及二塔相距為股弦較小塔距栁下平弦也甲東行通勾也不及二塔相距勾弦較也槐距大塔上高弦也術曰以股弦較不及平弦自之為實二較相減為法除之得平勾六十四若以勾弦較多高弦自之為實二較相減為法除之得高股二百二十五測圓海鏡分類釋術卷九
