  - {type: page-break, offset: 0, content: '', id: KR3f0043_WYG_003-1a, image: WYG0798/WYG0798-0140a.png}
body:
  text: 測圓海鏡分類釋術卷三元李冶撰明顧應祥釋術通勾與别股測望一凡三條圓城不知周徑乙從城外西南坤隅南行三百六十步而立甲從城外西北乾隅東行三百二十步見之問城徑釋曰乙從坤南行大差股也甲從乾東行通勾也此以通勾大差股測望通勾為城北大勾大差股為城西南之虚股術曰二行相乘得一十一萬五千二百為實倍乙行得七百二十為從作減從開平方法除之得全徑減從開平方法見二卷又曰二行相併得六百八十為通弦以通勾弦求容圓法求之即得南門外一百三十五步有樹甲從城外西北乾隅東行三百二十步見之問城徑釋曰此以通勾明股立法樹距南門明股也甲之東行通勾也通勾乃城北大勾明股乃城南餘股術曰東行自之又以樹距南門步乘之得一千三百八十二萬四千為立實倍樹距南門步以乘東行步得八萬六千四百為從方二為隅算作帶從負隅開立方法除之得半徑帶從負隅開立方曰布實於左從尾數至首常超二位又以從方約之定首位得一百置一於左上為法置一自之隅因得二萬為隅法併從方得一十萬六千四百為下法與上法相乘除實一千六十四萬餘實三百一十八萬四千三因隅法得六萬為方法三因初商得三百又以隅筭因之得六百為廉法約次商得二十置一於左次為上法置一乘廉法得一萬二千置一自之隅因得八百為隅法併方法從方廉隅共一十五萬九千二百為下法與上法相乘除實盡後凡言帶從負隅開立方法者俱倣此乙出東門南行三十步甲從乾隅東行三百二十步望乙與城叅直問城徑釋曰此以通勾股測望甲東行通勾也乙出東門南行三十步股也術曰二行相乘得九千六百為實以東行三百二十為從方二為隅算作減從負隅翻法開平方除之得半徑減從負隅翻法開平方曰初商一百置一於左上為法置一隅因得二百為隅法以減從方餘一百二十為下法與上法相乘除實一萬二千實不滿法反減實九千六百餘二千四百為負積倍餘法得四百為廉法次商二十置一於左次為上法置一隅因得四十為隅法併廉隅共四百四十減從不足反減從方三百二十餘一百二十為下法與上次法相乘除實盡後凡言帶從負隅翻法開平方者俱倣此底勾與别股測望二城西門南四百八十步有樹出北門東行二百步見之問城徑釋曰此底勾邊股立法測望西門南四百八十步邊股也出北門東行二百步底勾也底勾居城北勾之半邊股居城西股之半術曰二行相乘得九萬六千為實相併得六百八十為從二為隅筭作負隅減從開平方法除之得半徑負隅減從開平方法見二卷通勾勾條圓城出北門北行一十五步折而東行二百八步有樹出西門西行八步折而南行四百九十五步見之問城徑釋曰此以底勾過步帶短股邊股過步帶短勾立法測望出北門北行為短股折而東為長勾過於底勾出西門西行為短勾折而南為長股過於邊股術曰西行為短勾東行為長勾北行為短股南行為長股短勾併長勾以長股乘之得一十萬六千九百二十短股併長股以短勾乘之得四千八十相減餘一十萬二千八百四十為勾股維乘差又自之得一百五億七千六百六萬五千六百為三乘方實長股内減二短勾餘與長勾相減餘二百七十一為股減勾差長勾内減二短股餘與長股相減餘三百一十七為勾減股差股減勾差與勾減股差復相減餘四十六以乘勾股維乘差得四百七十三萬六百四十為從方股減勾差與勾減股相乘得八萬五千九百七長短勾併與長短股併相乘又倍之得二十二萬三百二十倍勾股維乘差得二十萬五千八百六十三數相併得五十一萬一千九百七為從一廉長短勾併得二百一十六又四之得八百六十四倍股減勾差得五百四十二二數相併得一千四百六為從二廉作帶從方廉開三乘方法除之得半徑帶從方廉開三乘方曰置所得三乘方積為實以從方廉約之初商得一百置一於左上為法置一乘從一廉得五千一百一十九萬七百置一自之以乘從二廉得一千四百六萬置一自乘再乘得一百萬為隅法併從方廉隅共七千九十八萬一千三百四十為下法與上法相乘除實七十億九千八百一十三萬四千餘積三十四億七千七百九十三萬一千六百為次商之實倍從一廉得一億二百三十八萬一千四百三因從二廉得四千二百一十八萬四因隅法得四百萬初商自之六因得六萬初商三之以乘下廉得四十二萬一千八百相併加入從一廉得九十九萬三千七百七為上廉初商四之帶從二廉得一千八百六為下廉次商二十置一為法置一乘上廉得一千九百八十七萬四千一百四十置一自之以乘下廉得七十二萬二千四百併方廉隅共一億七千三百八十九萬六千五百八十為下法與上法相乘除實盡或作初商一百置一為法置一乘從一廉置一自之以乘從二廉置一自乘再乘為隅法併從方廉隅共七千九十八萬一千三百四十為下法與上法相乘除實七十億九千八百一十三萬四千餘實三十四億七千七百九十三萬一千六百為次實四因隅法得四百萬為方法初商自之六因得六萬為上廉初商四之得四百為下廉次商二十置一於左次為上法倍初商加次商得二百二十以乘從一廉得一億一千二百六十一萬九千五百四十初商三之併初次商因之得三萬六千次商自之得四百共三萬六千四百以乘從二廉得五千一百一十七萬八千四百以兩從廉併入從方共一億六千八百五十二萬八千五百八十為從置一乘上廉得一百二十萬置一自之以乘下廉得一十六萬置一自乘再乘得八千為隅法併方廉隅共五百三十六萬八千帶從共一億七千三百八十九萬六千五百八十為下法與上法相乘除實盡此法分别從方從廉明白故重録附之出西門南行二百二十五步有塔出北門東行六十四步望塔正居城之半問城徑釋曰此以不及底勾與不及邊股測望南行二百二十五步與高股同即半徑為勾之股東行六十四步與平勾同即半徑為股之勾也當以平勾高股立法為是但其望塔當城之半故附底勾邊股條下術曰二行相乘即半徑筭乙從城外西南坤隅南行三百六十步甲出北門東行二百步見之問城徑釋曰此以底勾大差股立法測望乙從坤隅南行大差股也甲東行底勾也底勾為城北東半勾大差股為城西南虚股術曰二行相乘得七萬二千倍之得一十四萬四千為實以南行三百六十為從方作帶從開平方法除之得全徑帶從開平方法見一卷乙出南門直行一百三十五步甲出北門東行二百步見之問城徑釋曰此底勾明股立法測望乙出南門直行明股也甲出北門東行底勾也底勾為城北半勾明股為城南餘股術曰東行自之以南行乘之得五百四十萬又四之得二千一百六十萬為立方實以南門餘股一百三十五為從廉作帶從廉開立方法除之得全徑帶從廉開立方曰置所得立積為實以從廉約之初商二百置一於左上為法置一乘從廉得二萬七千置一自之得四萬為隅法併從廉共六萬七千為下法與上法相乘除實一千三百四十萬餘實八百二十萬倍從廉得五萬四千三因隅法得一十二萬相併得一十七萬四千為方法三因初商帶從廉得七百三十五為廉法約次商得四十置一於左次為上法置一乘廉法得二萬九千四百置一自之得一千六百為隅法併方廉隅共二十萬五千為下法與上法相乘除實盡後凡言帶從廉開立方法者俱倣此乙出南門南行一百三十五步而立甲出北門北行一十五步折而東行二百八步見之問城徑釋曰此底勾帶短股與明股立法測望乙出南門南行明股也甲出北門北行北門外短股也折而東行類底勾而過之術曰以東行乗南行得二萬八千八十自之得七億八千八百四十八萬六千四百為三乘方實東行自之得四萬三千二百六十四以乘南行得五百八十四萬六百四十倍之得一千一百六十八萬一千二百八十為從方北行自之於上併南北二行以減東行餘自之減上位餘數減上寄位併南北二行以東行乘之倍之以減寄位餘五萬六千九百八十八為從一廉四之東行得八百三十二於上併南北二行減東行餘五十八四之得二百三十二以減上位餘六百為從二廉四為虚隅作帶從二廉減從翻法開三乘方開之得半徑帶一廉以從二廉益從減從為法翻法開三乘方曰列所得三乘方實從一廉從二廉隅法約之初商一百置一於左上為法置一乘從一廉得五百六十九萬八千八百為益隅之廉置一自之以乘從二廉得六百萬為益從之廉併入從方共一千七百六十八萬一千二百八十為通法置一自乘再乘以隅因之得四百萬為隅法併益隅之廉共九百六十九萬八千八百為減實以減通法餘七百九十八萬二千四百八十為下法與上法相乘除實七億九千八百二十四萬八千實不滿法翻減實七億八千八百四十八萬六千四百餘九百七十六萬一千六百為負積二因乘出從一廉得一千一百三十九萬七千六百為益隅之廉三因乘出從二廉得一千八百萬為益從之廉又三之初商乘從二廉得一十八萬為益從次廉四因隅法得一千六百萬為方法初商自之六因又以隅因得二十四萬為上廉初商四之隅因得一千六百為下廉次商二十置一於左上為法置一乘從一廉得一百一十三萬九千七百六十併益隅之廉共一千二百五十三萬七千三百六十共為益隅置一乘益從次廉得三百六十萬置一自之以乘從二廉得二十四萬併二數加入益從之廉共二千一百八十四萬為益從併入從方共三千三百五十二萬一千二百八十為通法置一乘上廉得四百八十萬置一自之以乘下廉得六十四萬置一自乘再乘隅因得三萬六千為隅法併方法上下廉隅法得二千一百四十七萬二千併益隅共三千四百萬九千三百六十為減實以減通法不及減反減通法三千三百五十二萬一千二百八十餘四十八萬八千八十為負法與上法相乘除負積盡後凡言帶一廉以二廉益從減從翻法開三乘方法者俱倣此甲乙二人同出北門行至東北隅艮地分路乙往南行一百五十步而立甲又東行連前共二百步望乙與城相叅直問城徑釋曰此底勾小差股立法測望甲前後共東行底勾也乙往南行小差股也術曰二行相乘又以乙南行乘之得四百五十萬為實二行相減以乘乙南行得七千五百二行相乘得三萬二數相併得三萬七千五百為法實如法而一得半徑又曰二行相乘得三萬為實倍底勾減小差股餘二百五十為法乙出東門南行三十步而立甲出北門東行二百步望乙與城相叅直問城徑釋曰此底勾股立法測望乙出東門南行股也甲出北門東行底勾也術曰二行相乘得六千為平實相減得一百七十為從方作減從翻法開平方法除之得半徑減從翻法開平方法見二卷又曰乙南行自之得九百為股筭以乘東行得一十八萬為立實股筭為從方東行内減二之乙南行餘一百四十為益廉作帶從減益廉翻法開立方法除之得半徑帶從減益廉翻法開立方曰置所得積一十八萬以從方廉約之初商一百置一於左上為法置一乘從廉得一萬四千置一自之得一萬為隅法帶從方共一萬九百以減益廉餘三千一百為下法與上法相乘除實二十一萬實不滿法反減實一十八萬餘一十三萬為負積倍益廉得二萬八千三因隅法得三萬為方法三因初商得三百為廉法約次商得二十置一於左次為上法置一乘益廉得二千八百併入倍益廉得三萬八百置一乘廉法得六千置一自之得四百為隅法併方從方廉隅共三萬七千三百反減益廉三萬八百餘六千五百為下法與上法相乘除實盡後凡言帶從減廉翻法開立方法者倣此大差勾與别股測望三甲乙二人俱在城西門南行至西南坤隅分路乙往東行一百九十二步而立甲復南行計前後共四百八十步望乙與城相叅直問城徑釋曰此大差勾與邊股立法測望乙自坤隅東行大差勾也甲自西門往南共行邊股也術曰二行相乘得九萬二千一百六十又以乙東行乘之得一千七百六十九萬四千七百二十為實二行相減餘二百八十八亦以東行乘之得五萬五千二百九十六加二行相乘之數共一十四萬七千四百五十六為法實如法而一得半徑又曰二行相乘為實倍甲南行減乙東行餘為法甲從城外西南坤隅東行一百九十二步乙從東北艮隅南行一百五十步望甲與城相叅直問城徑釋曰此大差勾與小差股立法測望甲東行大差勾也乙南行小差股也與小差勾大差股同術曰二行相乘倍之即全徑筭小差勾與别股立法測望四乙從城外東北艮隅東行八十步甲從城外西北乾隅南行六百步見之問城徑釋曰此小差勾與通股立法測望乙從艮隅東行小差勾也甲從乾隅南行通股也與通勾大差股同法術曰二行相乘倍之得九萬六千為實二之東行得一百六十為從作帶從開平方法除之得半徑帶從開平方法見一卷乙從城外東北艮隅往東行八十步甲出西門南行四百八十步見之問城徑釋曰此小差勾與邊股立法測望乙東行小差勾也甲南行邊股也術曰二行相乘倍之得七萬六千八百為實以乙東行為從作帶從開平方法除之得全徑帶從開平方法見一卷乙從艮隅東行八十步而立甲從城外西南坤隅南行三百六十步見之問城徑釋曰此以小差勾大差股立法測望乙東行小差勾也甲南行大差股也術曰二行相乘倍之即圓徑筭明勾與别股測望五乙出南門東行七十二步而立甲從城外西北乾隅南行六百步望乙與城相叅直問城徑釋曰此明勾通股立法測望乙出南門東行明勾也甲從乾隅南行為通股術曰二行相乘得四萬三千二百為實以甲南行六百為從方二為隅法作負隅減從開平方法除之得半徑負隅減從開平方法見二卷乙出南門東行七十二步而立甲出西門南行四百八十步望乙與城相叅直問城徑釋曰此明勾邊股立法測望乙東行明勾也甲南行邊股也術曰乙東行自之得五千一百八十四為明勾筭以南行乘之得二百四十八萬八千三百二十為立方實明勾筭為從南行内減二東行餘三百三十六為益廉作帶從減廉開立方法除之得半徑帶從減廉開立方曰置所得立方實以從方從廉約之初商一百置一於左上為法置一乘益廉得三萬三千六百置一自之得一萬為隅法帶從方共一萬五千一百八十四以減益廉餘一萬八千四百一十六為下法與上法相乘除實一百八十四萬一千六百餘實六十四萬六千七百二十為次商之實倍益廉得六萬七千二百三因隅法得三萬為方法三因初商得三百為廉法約次商得二十置一於左上為法置一乘益廉得六千七百二十加入前倍廉共七萬三千九百二十置一乘廉法得六千置一自之得四百為隅法併方法從方廉隅共四萬一千五百八十四以減益廉餘三萬二千三百三十六為下法與上法相乘除實盡後凡言帶從減廉開立方法者俱倣此又曰明勾邊股相乘得三萬四千五百六十為實明勾邊股相減餘四百八為從方一虚法作減從開平方除之尤捷甲出南門東行七十二步而立乙出東門南行三十步望乙與城相叅直問城徑釋曰此明勾股立法測望甲出南門東行明勾也乙出東門南行股也術曰二行相乘得二千一百六十為實相併得一百二為從作以從減法開平方除之得半徑以從減法翻法開平方曰置實于左從於右約初商得一百置一於左上為法置一為隅法以從減隅隅不及減從内翻減隅一百餘二為負從以負從為下法與上法相乘得二百反増入實内共二千三百六十四為次商之實倍隅法得二百為廉法約次商得二十置一於左次為上法置一為隅法併廉隅共二百二十以從減之餘一百一十八為下法與上法相乘除實盡後凡如此類者俱倣此通變隨宜又術二行相併得一百二為太虚弦相減餘四十二即太虚勾股較倍弦筭減較筭餘一萬九千四十四平方開之得一百三十八為太虚勾股和加較半之為股減較半之為勾以太虚勾股求圓徑又曰二行相乘倍為實相減餘為從作帶從開平方法除之得虚勾二行相併即虚弦以勾弦求股以得圓徑勾與别股立法測望四乙出東門直行一十六步甲從城外西北乾隅南行六百步見之問城徑釋曰此以勾通股立法測望乙出東門直行勾也甲從乾隅南行通股也術曰甲南行自之又以乙東行一十六乘之得五百七十六萬為立方實倍東行以乘南行得一萬九千二百為從方二為隅作帶從負隅開立方法除之得半徑帶從負隅開立方法見前通勾明股乙出東門直行一十六步甲出西門南行四百八十步見之問城徑釋曰此勾邊股立法測望乙出東門直行勾也甲出西門南行邊股也術曰二行相乘得七千六百八十又以南行乘之得三百六十八萬六千四百又四之得一千四百七十四萬五千六百為立方實以東行一十六步為從廉作帶從廉開立方法除之得全徑帶從廉開立方法見前底勾明股條圓城不知周徑南門外一百三十五步有樹出東門直行一十六步見之問城徑釋曰此勾明股立法測望出東門外一十六步為勾城東之餘勾也樹在城南一百三十五步為明股城南之餘股也以餘勾餘股測城徑術曰餘勾餘股相乘為勾乘股筭自之得四百六十六萬五千六百為三乘方實勾乘股筭倍之得四千三百二十又以餘勾餘股併乘之得六十五萬二千三百二十為從方餘勾餘股相併自之得二萬二千八百一餘勾餘股相減自之得一萬四千一百六十二數相減餘八千六百四十為益廉作帶從廉添積開三乘方法除之得半徑帶從益廉添積開三乘方曰置所得三乘方積以從方廉約之初商一百置一於左上為法置一乘從益廉得八十六萬四千併從方共一百五十一萬六千三百二十為益積之法與上法相乘得一億五千一百六十三萬二千為益實添入原積共一億五千六百二十九萬七千六百為通實置一自乘再乘得一百萬為隅法與上法相乘除實一億餘五千六百二十九萬七千六百為次實二因益廉得一百七十二萬八千四因隅法得四百萬為方法初商自之六因得六萬為上廉初商四之得四百為下廉約次商得二十置一於左次為上法置一乘益廉得一十七萬二千八百併前倍廉共一百九十萬八百併從方共二百五十五萬三千一百二十為益積之法與上法相乘得五千一百六萬二千四百為益實添入次實共一億七百三十六萬為通實置一乘上廉得一百二十萬置一自之以乘下廉得一十六萬置一自乘再乘得八千為隅法併方廉隅共五百三十六萬八千為下法與上法相乘除實盡又為帶從方廉減隅翻法開三乘方其法曰初商一百置一於左上為法置一自乘再乘得一百萬為隅法置一乘從廉得八十六萬四千併從方共一百五十一萬六千三百二十以減隅法不及反減隅法一百餘五十一萬六千三百二十為負隅與上法相乘得五千一百六十三萬二千加原實共五千六百二十九萬七千六百為次商之實四因隅法得四百萬為方法初商自之六因得六萬為上廉初商四之得四百為下廉次商二十置一於左次為上法置一乘上廉得一百二十萬置一自之以乘下廉得一十六萬置一自乘再乘得八千為隅法併方法廉隅共五百三十六萬八千為通隅倍初商加次商得二百二十以乘從廉得一百九十萬八百併從方共二百五十五萬三千一百二十以減通隅餘二百八十一萬四千八百八十為下法與上法相乘除實盡後凡言如此類立法者倣此又術曰以樹去南門步自之得一萬八千二百二十五為餘股筭副置二位一以餘股乘之得二百四十六萬三百七十五為餘股立筭一以餘勾乘之得二十九萬一千六百為勾乘股立筭相乘得七千一百七十四億四千五百三十五萬為三乘方實餘勾餘股相乘得二千一百六十為勾股相乘筭倍之以乘餘股立筭得一百六億二千八百八十二萬為從方餘勾自之得二百五十六為餘勾筭四之以乘餘股得一十三萬八千二百四十倍勾乘股立筭得五十八萬三千二百二數相減餘四十四萬四千九百六十為從二減廉以勾股相乘筭為隅筭作從廉減從方負隅開三乘方法除之得八十一為明勾弦較以除明股筭得二百二十五為明勾弦和加較半之為弦減較半之為勾勾股相乘倍為實以較除之得通弦和較通弦和較即城徑也從㢘減從方負隅開三乘方曰約初商八十置一於左上為法置一自之以乘從廉得二十八億四千七百七十四萬四千以減從方餘七十七億八千一百七萬六千置一自乘再乘得五十一萬二千以隅筭因之得一十一億五百九十二萬為隅法併從方共八十八億八千六百九十九萬六千為下法與上法相乘除實七千一百九億五千九百六十八萬餘實六十四億八千五百六十七萬為次實四因隅法得四十四億二千三百六十八萬為方法初商自之六因又以隅因得八千二百九十四萬四千為上廉初商四之隅因得六十九萬一千二百為下廉約次商得一置一於左次為上法倍初商加次商得一百六十一又併初次商為八十一乘之得一萬三千四十一以乘從廉得五十八億二百七十二萬三千三百六十以減餘從餘一十九億七千八百三十五萬二千六百四十為從方置一乘上廉置一自之以乘下廉俱如舊置一自乘再乘仍得一為隅法併方法從方廉隅共六十四億八千五百六十七萬為下法與上法相乘除實盡測圓海鏡分類釋術卷三
