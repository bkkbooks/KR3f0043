body:
  text: 測圓海鏡分類釋術卷四元李冶撰明顧應祥釋術通勾與别弦測望一圓城南門之南有樹甲從城外西北乾隅東行三百二十步乙出西門南行望樹及甲與城相叅直乃斜行二百五十五步至樹下問城徑釋曰此以通勾上高弦立法測望甲東行通勾也乙斜行乃天之日上高弦也乙從西門南行四百八十步為邊股樹在南門外一百三十五步為明股術曰二行相乘又以半甲東行乘之得一千三百五萬六千為立方實二行相乘得八萬一千六百半甲東行乘甲東行得五萬一千二百相併得一十三萬二千八百為益從甲東行三百二十為減從廉減從開立方法除之得半徑帶從以廉減從開立方曰布實於左從於右别置減從廉約初商得一百置一於左上為法置一乘從廉得三萬二千以減從方餘一十八百置一自之得一萬併餘從共一十一萬八百為下法與上法相乘除實一千一百八萬餘一百九十七萬六千倍減廉得六萬四千三因隅法得三萬為方法三因初商得三百為廉法約次商得二十置一於左次為上法置一乘減廉得六千四百併倍廉共七萬四百以減原從餘六萬二千四百置一乘廉法得六千置一自之得四百為隅法併方廉隅共三萬六千四百帶餘從共九萬八千八百為下法與上法相乘除實盡得半徑一百二十後凡言帶從以廉減從開立方法者倣此甲從城外西北乾隅東行三百二十步而立乙出南門直行不知步數望見甲與城相叅直遂斜行四百二十五步與乙相㑹問城徑釋曰此以通勾底弦立法測望甲東行通勾也乙自南門外斜行就甲為底弦乃日之地也術曰二行相減餘一百五為通勾底弦差以乘通勾得三萬三千六百又以半通勾乘之得五百三十七萬六千為立方實半通勾乘通勾得五萬一千二百與差乘通勾之數相減餘一萬七千六百為從方倍東行得六百四十步為益廉作帶從減益廉開立方法除之帶從減益廉開立方法見三卷明勾邊股下圓城南門外有槐樹一株東門外有栁樹一株兩樹斜相距二百八十九步甲從城外西北隅向東行三百二十步望槐栁與城相叅直問城徑釋曰此以通勾皇極弦立法測望甲東行通勾也兩樹斜相距皇極弦也原法先求出皇極勾即栁至城心步后以勾弦求股以皇極勾股求容圓即是術曰通勾與皇極弦相乘得九萬二千四百八十自之得八十五億五千二百五十五萬四百為三乘方實皇極弦自乗得八萬三千五百二十一為皇極弦筭以通勾乘之得二千六百七十二萬六千七百二十倍之得五千三百四十五萬三千四百四十為從方倍通勾皇極弦相乘之數得一十八萬四千九百六十為第一從廉倍皇極弦得五百七十八為第二益廉以二為隅筭作帶從廉負隅以廉隅添積開三乘方法除之得一百三十六為皇極勾求城徑以皇極勾弦求皇極股二百五十五勾股相乘倍為實以弦除之即得容圓全徑勾弦求股見一卷帶從廉負隅以廉隅添積開三乘方曰置所得三乘方積為實列從方從一廉從二益廉約商首一位得一百置一於左上為法置一自之以乘益廉得五百七十八萬置一自乘再乘以隅筭因之得二百萬為隅法益廉共七百七十八萬與上法相乘得七億七千八百萬為益實添入積内共九十三億三千五十五萬四百為通實置一乘從一廉得一千八百四十九萬六千為益從併入從方共七千一百九十四萬九千四百四十為下法與上法相乘除實七十一億九千四百九十四萬四千餘實二十一億三千五百六十萬六千四百為次商之實四因隅法得八百萬為方法初商自之六因又以隅筭因之得一十二萬為上廉初商四之隅因得八百為下廉次商三十置一於左次為上法倍初商加次商得二百三十併初次商為一百三十相乘得二萬九千九百又加初商自之一萬共三萬九千九百以乘從二益廉得二千三百六萬二千二百為益廉之實置一乘上廉得三百六十萬置一自之得九百以乘下廉得七十二萬置一自乘再乘得二萬七千隅因得五萬四千為隅法併方廉隅共一千二百三十七萬四千為益隅之實與益廉之實相併得三千五百四十三萬六千二百為益積之法與上次法相乘得一十億六千三百八萬六千為益積之實添入餘實共三十一億九千八百六十九萬二千四百為通實倍初商加次商得二百三十以乘從一廉得四千二百五十四萬八百為益從併入從方共九千五百九十九萬四千二百四十為下法與上次法相乘除實二十八億七千九百八十二萬七千二百尚餘三億一千八百八十六萬五千二百為三商之實二因上廉得七百二十萬三因下廉得二百一十六萬四因隅法得二十一萬六千併入方法共一千七百五十七萬六千為方法併初次商自之又六因得一十萬一千四百以隅筭因之得二十萬二千八百為上廉併初次商四之得五百二十以隅因得一千四十為下廉三商得六置一於左上為法倍初次商加三商得二百六十六併初次商加三商得一百三十六相乘得三萬六千一百七十六又以初次商併自之得一萬六千九百加之共五萬三千七十六以乘從二益廉得三千六十七萬七千九百二十八為益廉之實置一乘上廉得一百二十一萬六千八百置一自之以乘下廉得三萬七千四百四十相併得一百二十五萬四千二百四十為廉法置一自乘再乘得二百一十六以隅因之得四百三十二為隅法併方法廉法隅法共一千八百八十三萬六百七十二為益隅之實併益廉之實共四千九百五十萬八千六百為益積之法與上法相乘得二億九千七百五萬一千六百為益積添入餘實共六億一千五百九十一萬六千八百為通實倍初次商加三商得二百六十六以乘從一廉四千九百一十九萬九千三百六十為益從併從方共一億二百六十五萬二千八百為下法與上法六相乘除實盡得一百三十六為皇極勾此法以二廉與隅添積以第一廉益從為法又為帶從負隅以廉隅減從開三乘方法其法曰以八十五億五千二百五十五萬四百為正實以五千三百四十五萬三千四百四十為從方以一十八萬四千九百六十為從一廉以五百七十八為從二減廉二為隅算約初商得一百置一於左上為法置一自之得一萬以乘從二廉得五百七十八萬為減廉置一自乘再乘又以隅因得二百萬為隅法併減廉隅法得七百七十八萬為減從置一乘從一廉得一千八百四十九萬六千為益從以益從加入原從得七千一百九十四萬九千四百四十以減從減之餘六千四百一十六萬九千四百四十為下法與上法相乘除實六十四億一千六百九十四萬四千餘實二十一億三千五百六十萬六千四百為次商之實四因隅法得八百萬為方法初商自之六因又以隅因之得一十二萬為上廉初商四之隅因得八百為下廉約次商得三十置一於左上為法倍初商加次商得二百三十併初次商得一百三十相因得二萬九千九百又加初商自乘一萬共三萬九千九百以乘從二廉得二千三百六萬二千二百為減廉置一乘上廉得三百六十萬置一自之以乘下廉得七十二萬置一自乘再乘隅因得五萬四千為隅法併方廉隅共一千二百三十七萬四千為減隅併減廉減隅共三千五百四十三萬六千二百為減從倍初加次商得二百三十以乘從一廉得四千二百五十四萬八百為益從以加原從得九千五百九十九萬四千二百四十以減從減之餘六千五十五萬八千四十為下法與上法相乘除實一十八億一千六百七十四萬一千二百餘實三億一千八百八十六萬五千二百為三商之實二因上廉得七百二十萬三因下廉得二百一十六萬四因隅法得二十一萬六千併入方法共一千七百五十七萬六千為方法初次商併自之六因又以隅筭因之得二十萬二千八百為上廉初次商併四之隅因得一千四十為下廉約三商得六置一於左次為上法倍初次商加三商得二百六十六併初次三商共一百三十六相因得三萬六千一百七十六又加初次商相併自之一萬六千九百共五萬三千七十六以乘從二廉得三千六十七萬七千九百二十八為減廉置一乘上廉得一百二十一萬六千八百置一自之以乘下廉得三萬七千四百四十置一自乘再乘以隅因得四百三十二為隅法併方廉隅共一千八百八十三萬六百七十二為減隅減廉減隅相和得四千九百五十萬八千六百為減從倍初次加三商得二百六十六以乘從一廉得四千九百一十九萬九千三百六十為益從以加原從得一億二百六十五萬二千八百以減從減之餘五千三百一十四萬四千二百為下法與上法相乘除實盡此法以第一廉為益從第二廉與隅為減從以從為法後凡如此類者俱倣此圓城南門外往東有樹甲從城外西北隅東行三百二十步望樹與城叅直復斜行二百七十二步至樹下問城徑釋曰此以通勾黄長弦立法測望南門外往東七十二步有樹明勾也甲東行通勾也斜行至樹下地之月黄長弦也術曰二行相減餘四十八為差倍差倍東行相乘得六萬一千四百四十為實倍差倍東行步相併得七百三十六為益從二為隅法作負隅減從翻法開平方法除之得全徑負隅減從翻法開平方法見三卷通勾股條下前以半徑此以全徑推廣即是丙出南門東行乙出東門南行各不知步數而立甲從城外西北乾隅東行三百二十步望乙丙俱與城相叅直既而乙欲就丙乃斜行一百二步相㑹問城徑釋曰此以通勾太虚弦立法測望丙出南門東行七十二為明勾乙出東門南行三十步為股甲東行通勾也乙斜行太虚弦也以此勾弦立法術曰甲東行自之得一十萬二千四百為東行筭倍斜行乘之得二千八十八萬九千六百為立方實倍斜行乘東行得數又加倍東行筭得二十七萬八十為從方四之東行得一千二百八十為益廉四為隅法作帶從負隅以廉添積開立方法除之得半徑帶從負隅以廉添積開立方曰置所得立方實于左以從方益廉隅筭約之初商一百置一於左上為法置一乘益廉得一十二萬八千與上法相乘得一千二百八十萬為益實添入積内得三千三百六十八萬九千六百為通實置一自之又以隅筭因之得四萬為隅法併從方共三十一萬八十為下法與上法相乘除實三千一百萬八千餘實二百六十八萬一千六百為次實二因乘過益廉得二十五萬六千為益廉三因隅法得一十二萬為方法三因初商得三百為廉法次商二十置一於左上為法置一乘原益廉得二萬五千六百併入乘過益廉得二十八萬一千六百與上法相乘得五百六十三萬二千為益實添入次實共八百三十一萬三千六百為通實置一乘廉法得六千隅因得二萬四千置一自之隅因得一千六百為隅法併方廉隅共一十四萬五千六百帶從方共四十一萬五千六百八十為下法與上法相乘除實盡後凡言帶從負隅以廉添積開立方法俱倣此又為帶從廉半翻法減從負隅開立方法法曰初商一百置一於左上為法置一乘從廉得一十二萬八千以減從方餘一十四萬二千八十置一自之隅因得四萬為隅法併減餘從方共一十八萬二千八十為下法與上法相乘除實一千八百二十萬八千餘實二百六十八萬一千六百為次商之實二因從廉得二十五萬六千三因隅法得一十二萬為方法三因初商得三百為廉法約次商得二十置一於左次為上法置一乘從廉得二萬五千六百併入前二因從廉得二十八萬一千六百以減從方不及反減從方二十七萬八十餘一萬一千五百二十為負從置一乘廉法以隅因得二萬四千置一自之隅因得一千六百為隅法併方廉隅共一十四萬五千六百反減負從餘一十三萬四千八十為下法與上法相乘除實盡後凡如此類者俱倣此又術曰斜行乘東行筭半之得五百二十二萬二千四百為實斜行乘東行如東行筭半之得六萬七千五百二十為從方東行三百二十為從廉如前法求之得半徑不用隅算添積減從隨意又曰四之斜行以乘東行筭得四千一百七十七萬九千二百為正實倍斜行乘東行加二之東行筭得二十七萬八十為從方倍東行得六百四十為從廉如前法開之得全徑二百四十添積減從俱同乙出城東門上南不知步數而立甲從城外西北乾隅東行三百二十步望乙與城相叅直復斜行一百七十步與乙相㑹問城徑釋曰此以通勾小差弦立法測望甲東行通勾也斜行小差弦也術曰二行相減餘一百五十為差自之得二萬二千五百以乘東行得七百二十萬為實倍差以乘東行得九萬六千為從方倍差得三百為隅算作負隅減從開平方法除之得半徑負隅減從開平方法見二卷通勾勾條又術倍東行筭得二十三萬四千八百倍二行相乘數得一十萬八千八百相減餘九萬六千為實倍東行得六百四十為從作減從開平方法除之得全徑二百四十減從開平方法曰列實于左從于右約初商得二百置一於左上為法置一為隅法以減從方餘四百四十為下法與上法相乘除實八萬八千餘八千為次商之實餘從内再減二百餘二百四十為從次商四十置一於左上為法置一為隅法以減從方餘二百為下法與上法相乘除實盡法見二卷底勾勾條下因從有重位故重出圓城南門外直南不知步數有槐樹一株南門外東行不知步數有栁樹一株槐栁斜相距一百五十三步甲從城外西北隅東行三百二十步望槐栁與城相叅直問城徑釋曰此以通勾明弦立法測望二樹斜相距明弦也甲東行通勾也術曰通勾自之得一十萬二千四百為通勾筭二行相乘得四萬八千九百六十又以二數相乘得五十億一千三百五十萬四千為三乘方實明弦乘通勾筭三之得四千七百萬一千六百為從方倍二行相乘數以減通勾筭餘四千四百八十為第一廉倍通勾得六百四十為第二益廉二步為隅法作帶從負隅以二廉減從方開三乘方法除之得半徑帶上廉負隅以下廉減從開三乘方法曰置所得三乘方實以㢘隅從方約之初商一百置一於左上為法置一自之以乘從二廉得六百四十萬為減廉以減從方餘四千六十萬一千六百為從方置一乘第一廉得四十四萬八千為益廉置一自乘再乘得一百萬又以隅因之得二百萬為隅法併從方益廉隅法共四千三百四萬九千六百為下法與上法相乘除實四十三億四百九十六萬餘實七億八百五十四萬四千為次商之實四因隅法得八百萬為方法初商自之六因又以隅法因之得一十二萬為上廉初商四之隅因得八百為下廉約次商得二十置一於左上為法倍初商加次商得二百二十以乘從二廉得一十四萬八百併初次商得一百二十因之得一千六百八十九萬六千為減廉以減餘從餘二千三百七十萬五千六百為從方倍初商加次商得二百二十以乘第一廉得九十八萬五千六百為益廉置一乘上廉得二百四十萬置一自之以乘下廉得三十二萬置一自乘再乘又以隅因之得一萬六千為隅法併方法從方廉益上下廉隅法共三千五百四十二萬七千二百為下法與上法相乘除實盡丙出東門南行乙出東門直行各不知步數而立甲從城外西北乾隅東行三百二十步回望乙丙與城相叅直既而乙欲就丙乃斜行三十四步相㑹問城徑釋曰此以通勾弦立法測望甲東行通勾也乙斜行三十四步就丙弦也術曰通勾自之得一十萬二千四百為通勾筭又以通勾増乘得三千二百七十六萬八千倍弦乘通勾筭得六百九十六萬三千二百二數相減餘二千五百八十萬四千八百為立方實弦乘通勾得一萬八百八十以減二之通勾筭得一十九萬三千九百二十為從方通勾加五得四百八十為益廉五分為隅法作帶從負隅以廉添積開立方法除之得全徑帶從負隅以廉添積開立方曰置所得立方實及從方益廉約初商得二百置一於左上為法置一乘益廉得九萬六千與上法相乘得一千九百二十萬為益實添入積内得四千五百萬四千八百為實置一自之得四萬以隅算五分因之得二萬為隅法併從方共二十一萬三千九百二十為下法與上法相乘除實四千二百七十八萬四千餘實二百二十二萬八百倍益廉得一十九萬二千三因隅法得六萬為方法三因初商得六百以隅因得三百為廉法約商次位得四十置一於左上為法置一乘原益廉得一萬九千二百併入倍廉得二十一萬一千二百與上法四十相乘得八百四十四萬八千為益實加入餘實得一千六十六萬八千八百為實置一乘廉法得一萬二千置一自之隅因得八百為隅法併方法從方廉隅共二十六萬六千七百二十為下法與上法相乘除實盡此法已見前通勾太虚弦條下因隅算不同故又重出又為帶從以廉減從負隅開立方法其法曰初商二百置一於左上為法置一乘從廉得九萬六千以減從方餘九萬七千九百二十為從置一自之隅因得二萬為隅法併從方共一十一萬七千九百二十為下法與上法相乘除實二千三百五十八萬四千餘實二百二十二萬八百從方内再減從廉九萬六千餘一千九百二十為從方三因隅法得六萬為方法三因初商隅因得三百為廉法次商四十置一於左上為法置一乘從廉得一萬九千二百以減餘從不及減於從廉内反減餘從一千九百二十餘一萬七千二百八十為負從置一乘廉法得一萬二千置一自之隅因得八百為隅法併方廉隅共七萬二千八百反減負從餘五萬五千五百二十為下法與上法相乘除實盡又術斜步乘東行筭得三百四十八萬一千六百為立方實斜步乘東行以減半東行筭得四萬三百二十為從方半步為隅法作負隅帶從開立方法除之得勾圓差八十步以減通勾即半徑負隅帶從開立方法見三卷通勾明股條東門外不知步數有樹甲從城外西北乾隅東行三百二十步見之復斜行一百三十六步至樹下問城徑釋曰此以通勾下平弦立法測望甲東行通勾也斜行至樹下乃川之地下平弦也術曰二行相減餘一百八十四為差倍差減東行以其餘乘東行得一萬五千三百六十為實倍差得三百六十八為從方二為隅法作減從負隅翻法開平方法除之得半徑減從負隅翻法開平方見三卷通勾股條下底勾與别弦測望二乙從城外西北乾隅南行不知步數而立甲出北門東行二百步見之復斜行六百八十步與乙㑹釋曰此以底勾通弦測望甲出北門東行二百步底勾也斜行六百八十步通弦也術曰二行相減餘四百八十曰差相併得八百八十曰和差和相乘得四十二萬二千四百減去差筭餘一十九萬二千為實差和相併得一千三百六十為從二為隅算作帶從負隅開平方除之得半徑帶從負隅開平方法曰置實于左從於右約初商得一百置一於左上為法置一乘隅算得二百為隅法併從方共一千五百六十為下法與上法相乘除實一十五萬六千餘實三萬六千倍隅法得四百為廉法約次商二十置一於左上為法置一乘隅算得四十為隅法併從方廉隅共一千八百為下法與上法相乘除實盡後凡言帶從負隅開平方法者俱倣此又術以差筭二十三萬四百為實以東行步減差餘二百八十為從方作帶從開平方法除之得三百六十為通勾弦較以較減弦即通勾以通勾弦求容圓法求之得城徑此法以半勾全弦求股以求弦和較勾弦求容圓見一卷南門外不知步數有塔一座東門外往南不知步數有樹甲出北門東行二百步望樹與塔俱與城相叅直及量樹斜距塔二百五十五步釋曰此以底勾下高弦立法測望出北門東行二百底勾也塔距樹即日之山下高弦也術曰底勾筭與下高弦相乘得一千二十萬為立方實以底勾筭四萬為從方高弦為從廉作帶從方廉開立方法除之得半徑帶從方廉開立方曰置實于左以從方從廉約之初商一百置一於左上為法置一乘從廉得二萬五千五百置一自之得一萬為隅法併從方從廉隅共七萬五千五百為下法與上法相乘除實七百五十五萬餘實二百六十五萬二因從廉得五萬一千三因隅法得三萬相併得八萬一千為方法三因初商得三百帶從廉得五百五十五為廉法次商二十置一於左上為法置一乘廉法得一萬一千一百置一自之得四百為隅法併方法從方廉隅共一十三萬二千五百為下法與上法相乘除實盡後凡言帶從方廉開立方法者俱倣此南門外不知步數有樹乙從南門東行亦不知步數而立甲出北門東行二百步望樹與乙與城相叅乙復斜行一百五十三步至樹下與甲相望問城徑釋曰此以底勾明弦立法測望甲出北門東行底勾也乙斜行至樹下明弦也術曰半底勾乘明弦得一萬五千三百為實二行相併半之得一百七十六步半為從方半為隅算作帶從負隅開平方法除之得七十二為明勾帶從負隅開平方法見前底勾通股條求城徑以明勾乘底勾平方開之得半徑又曰勾弦求股以明勾股求容圓法求之得全徑東門外往南有樹乙出東門直行不知步數而立甲出北門東行二百步望乙與樹俱與城相叅直乙遂斜行三十四步至樹下釋曰此以底勾弦立法測望甲出北門東行底勾也乙斜行至樹下弦也術曰底勾減二弦餘一百三十二以底勾乘之得二萬六千四百又以弦筭一千一百五十六乘之得三千五十一萬八千四百為三乘方實倍底勾以弦筭乘之得四十六萬二千四百為從方底勾減弦餘自之得二萬七千五百五十六為從一廉底勾減弦餘倍之得三百三十二為從二廉作帶從方上廉以下廉減從開三乘方法除之得股三十求城徑以勾股求容圓法求之帶從方廉以下廉減從開三乘方曰約初商得三十置一於左上為法置一自之得九百以乘從二廉得二十九萬八千八百為減廉以減從方餘一十六萬三千六百為從方置一乘第一廉得八十二萬六千六百八十為益廉置一自乘再乘得二萬七千為隅法併從方益廉隅法共一百一萬七千二百八十為下法與上法相乘除實盡得三十為股後凡如此類者俱倣此乙出南門東行不知步數而立甲出北門東行二百步見之乃斜行二百七十二步與乙相㑹釋曰此以底勾黄長弦立法測望東行底勾也斜行黄長弦也術曰二行相減餘七十二為差以乘甲東行得半徑筭四之即全徑筭各以平方開之乙出東門南行不知步數而立甲出北門東行二百步見之斜行一百七十步與乙㑹釋曰此以底勾小差弦立法測望乙出東門行三十步乃東之山甲出北門東行底勾也斜行與乙㑹乃山之地小差弦也術曰以二行差三十乘甲東行得六千為平實以斜行一百七十為從方作減從翻法開平方法除之得半徑減從翻法開平方法見二卷及三卷底勾股條乙出東門東行不知步數而立甲出北門東行二百步望乙與城相叅直乃斜行一百三十六步與乙㑹釋曰此以底勾下平弦立法測望甲東行底勾也斜行與乙㑹下平弦也術曰倍二行差以減東行步餘七十二以乘東行得半徑筭倍平弦減底勾以底勾乘之亦同大差勾與别弦測望三乙從城外東北艮隅東行不知步數而立甲從城外西南坤隅東行一百九十二步望乙與城角相叅直復斜行二百七十二步與乙㑹釋曰此以大差勾黄長弦立法測望甲從坤隅東行為坤之月大差勾也斜行與乙㑹乃月之地黄長弦也術曰倍大差勾減黄長弦餘一百一十二為倍勾減弦差自之得一萬二千五百四十四黄長弦自之得七萬三千九百八十四相減餘六萬一千四百四十為平實以倍勾減弦差四之得四百四十八為從八為益隅作負隅減法開平方法除之得半徑負隅以從減法開平方曰置實于左以從約之初商一百置一于左上為法置一乘隅法得八百以減去從方四百四十八餘三百五十二為下法與上法相乘除實三萬五千二百餘實二萬六千二百四十倍隅法得一千六百為廉法次商二十置一於左上為法置一乘隅法得一百六十併入廉法共一千七百六十減去從方四百四十八餘一千三百一十二為下法與上法相乘除實盡後凡言負隅以從減法開平方法者倣此又為以從添積負隅開平方法詳見八卷皇極弦和和與太虚勾股較條下明勾與别弦測望四乙出東門不知步數而立甲出南門東行七十二步見之又斜行一百三十六步就乙釋曰此以明勾平弦測望甲出南門東行七十二步明勾也斜行就乙乃月之川下平弦也術曰斜行自之得一萬八千四百九十六為平弦筭二行相減餘六十四自之得四千九十六為差筭即平勾筭以減弦筭餘為平股筭開之得股平股即圓半徑也乙出東門南行不知步數而立甲出南門往東七十二步見乃斜行一百二步與乙㑹問城徑釋曰此以明勾太虚弦立法測望甲出南門東行明勾也斜行就乙太虚弦也術曰二行相減餘三十為差斜行自之為斜筭倍差乘東行又倍之為八千六百四十以減斜筭餘一千七百六十四平方開之得四十二為較倍差乘東行得四千三百二十為實較為從方平方開之得四十八為虚勾加較為股併弦為弦和和即城徑測圓海鏡分類釋術卷四
