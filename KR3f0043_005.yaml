body:
  text: 測圓海鏡分類釋術卷五元李冶撰明顧應祥釋術通股與别弦測望一圓城乙出東門東行不知步數而立甲從城外西北乾隅南行六百步見之復斜行五百四十四步與乙相㑹釋曰此以通股邊弦立法測望甲從乾隅南行六百步通股也斜行乃天之川邊弦也術曰二行相減餘五十六為差差乘南行得三萬三千六百又以半南行乘之得一千八萬為立方實半南行以乘南行得一十八萬與差乘南行相併得二十一萬三千六百為從方倍南行得一千二百為從廉作帶從廉減從方翻法開立方法除之得半徑帶從廉減從翻法開立方曰置所得實于左以從方從廉約之初商一百置一於左上為法置一乘從廉得一十二萬以減從方餘九萬三千六百為從置一自之得一萬為隅法併從方共一十萬三千六百為下法與上法相乘應除實一千三十六萬實不滿法反除實一千八萬餘二十八萬為負積倍從廉得二十四萬三因隅法得三萬為方法三因初商得三百為廉法約次商二十置一於左上為法置一乘從廉得二萬四千併入倍廉共二十六萬四千以減從方不及反減從方二十一萬三千六百餘五萬四百為負從置一乘廉法得六十置一自之得四百為隅法併方廉隅共三萬六千四百以減負從餘一萬四千為下法與上法相乘除實盡此術改為以從廉添積開立方亦可後凡言帶從廉減從方翻法開立方法者俱倣此出城東門外往南有樹甲從西北乾隅南行六百步見樹斜行五百一十步至樹下問城徑釋曰此以通股黄廣弦測望南行通股也斜行乃天之山黄廣弦也術曰二行相減餘九十為差倍差以乘倍南行得二十一萬六千為實差併南行倍之得一千三百八十為從二為隅算作減從負隅開平方法除之得全徑減從負隅開平方法見二卷通勾勾條又曰倍差乘南行得一十萬八千為實差併南行共六百九十為從方作減從開平方法除之得全徑不用隅算減從開平方法見二卷底勾勾條出城南門外往東不知步數有樹甲從城外西北乾隅南行六百步望樹與城相叅直乃斜行四百八步至樹下問城徑釋曰此以通股大差弦立法測望南行通股也斜行乃天之月大差弦也術曰南行自之得三十六萬為南行筭兩行相乘得二十四萬四千八百倍之内減南行筭餘一十二萬九千六百為實倍南行得一千二百為從作減從開平方法除之得半徑減從開平方法見二卷底勾勾條又術兩行相乘得二十四萬四千八百以減南行筭餘一十一萬五千二百為實二為隅算作負隅開平方法除之得全徑負隅開平方法見一卷底勾底弦條下圓城南門外不知步數有樹甲從城外西北乾隅南行六百步望樹與城叅直斜行二百五十五步至樹下問城徑釋曰此以通股上高弦立法測望甲南行為通股斜行為天之日上高弦也術曰二行相減餘三百四十五為差倍之減甲南行餘九十以乘南行得五萬四千為實以倍差六百九十為從方以二為隅算作負隅減從開平方法除之得半徑負隅減從開平方法見二卷通勾勾條圓城南門外不知步數有槐一株東門外不知步數有栁一株有人從城外西北隅南行六百步望二樹與城東南角相叅直其槐栁斜相距二百八十九步問城徑釋曰此以通股皇極弦立法測望南行為通股二樹斜相距步即皇極弦日之川也術曰南行步與二樹相距步相乘又自之得三百億六千七百五十六萬為三乘方實通股乘皇極弦筭倍之得一億二十二萬五千二百為從方通股皇極弦相乘倍之得三十四萬六千八百為從一廉倍皇極弦得五百七十八為從二廉二為隅算作帶從負隅以廉隅添積開三乘方法除之得二百五十五為皇極股求城徑以皇極股弦求皇極勾得一百三十六勾股相乘倍為實以弦除之得容圓全徑帶從負隅以廉隅添積開三乘方曰置所得三乘方實從方從廉隅算約之初商二百置一於左上為法置一乘從一廉得六千九百三十六萬為益從加從方共一億六千九百五十八萬五千二百為下法置一自之以乘從二廉得二千三百一十二萬為益隅置一自乘再乘以隅筭因之得一千六百萬為隅法併益隅共三千九百一十二萬為益積之法以初商因之得七十八億二千四百萬為益實添入原積得三百七十八億九千一百五十六萬為通實以下法上法相乘除實三百三十九億一千七百四萬餘三十九億七千四百五十二萬為次商之實二因益從得一億三千八百七十二萬為益從方三因益隅得六千九百三十六萬為益隅之方三之初商乘從二廉得三十四萬六千八百為益隅之廉四因隅法得六千四百萬為方法初商自之六因又隅因之得四十八萬為上廉初商四之隅因得一千六百為下廉約次商得五十置一於左上為法置一乘從廉得一千七百三十六萬為益從廉併益從方共一億五千六百六萬為益從之實加入從方共二億五千六百二十八萬五千二百為下法置一乘益隅之廉得一千七百三十四萬置一自之以乘從二廉得一百四十四萬五千為益隅之隅併益隅方廉隅共八千八百一十四萬五千為益隅之實置一乘上廉得二千四百萬置一自之以乘下廉得四百萬置一自乘再乘隅因得二十五萬為隅法併方上下廉隅法共九千二百二十五加益隅之實共一億八千三十九萬五千為益積之法以次商乘之得九十億一千九百七十五萬為益實添入餘積共一百二十九億九千四百二十七萬為通實以下法與上法相乘除實一百二十八億一千四百二十六萬餘一億八千一萬為二商之實二因益從廉得三千四百六十八萬併入益從方得一億七千三百四十萬為益從方二因益隅之廉得三千四百六十八萬三因益隅之隅得四百三十三萬五千俱併入益隅方得一億八百三十七萬五千為益隅方併初次商三之以乘從二廉得四十三萬三千五百為益隅之廉二因上廉得四千八百萬三因下廉得一千二百萬四因隅法得一百萬併入方法共一億二千五百萬為方法併初次商自之六因又隅因之得七十五萬為上廉併初次商四之隅因得二千為下廉約三商得五置一於左上為法置一乘從一廉得一百七十三萬四千為益從廉併益從方得一億七千五百一十三萬四千為益從之實加入從方共二億七千五百三十五萬九千二百為下法置一乘益隅之廉得二百一十六萬七千五百置一自之以乘從二廉得一萬四千四百五十為益隅之隅併益隅方廉隅共一億一千五十五萬六千九百五十為益隅之實置一乘上廉得三百七十五萬置一自之以乘下廉得五萬置一自乘再乘隅因得二百五十為隅法併方上下廉隅共一億二千八百八十萬二百五十加益隅之實得二億三千九百三十五萬七千二百為益積之法以三商因之得一十一億九千六百七十八萬六千為益實添入餘積得一十三億七千六百七十九萬六千為通實下法與上法相乘除盡又為以二廉隅減一廉從方開三乘方其法曰初商二百置一於左上為法置一乘從一廉得六千九百三十六萬為益從方併從方共一億六千九百五十八萬五千二百為從置一自之以乘從二廉得二千三百一十二萬為益隅之實置一自乘再乘隅因得一千六百萬為隅法加益隅之實得三千九百一十二萬為減實以減從餘一億三千四十六萬五千二百為下法與上法相乘除實二百六十億九千三百四萬餘三十九億七千四百五十二萬為次商之實二因益從之實得一億三千八百七十二萬為益從方三因益隅之實得九千六百三十六萬為益隅之方三之初商以乘從二廉得三十四萬六千八百為益隅之廉初商自之六因又隅因得四十八萬為上廉初商四之隅因得一千六百為下廉次商五十置一於左上為法置一乘從一廉得一千七百三十四萬為益從之廉併益從方得一億五千六百六萬為益從之實加入從方共二億五千六百二十八萬五千二百為從置一乘益隅之廉得一千七百三十四萬置一自之以乘從二廉得一百四十四萬五千為益隅之隅併益隅方廉隅共八千八百一十四萬五千為益隅之實置一乘上廉得二千四百萬置一自之以乘下廉得四百萬置一自乘再乘隅因得二十五萬為隅法併方廉隅得九千一百二十五萬加益隅之實得一億八千三十九萬五千為減實以減從餘七千五百八十九萬二百為下法與上法相乘除實三十七億九千四百五十一萬餘一億八千一萬為三商之實二因益從方廉得三千四百六十八萬併入益從方得一億七千三百四十萬為益從方二因益隅之廉得三千四百六十八萬三因益隅之隅得四百三十三萬五千俱併入益隅之方得一億八百三十七萬五千為益隅之方併初次商三之以乘從二廉得四十三萬三千五百為益隅之廉二因上廉得四千八百萬三因下廉得一千二百萬四因隅法得一百萬併入方法共一億二千五百萬為方法併初次商自之十二因得七十五萬為上廉併初次商八因得二千為下廉三商得五置一於左上為法置一乘從一廉得一百七十三萬四千為益從廉併益從方得一億七千五百一十三萬四千為益從之實加入從方共二億七千五百三十五萬九千二百為從置一乘益隅之廉得二百一十六萬七千五百置一自之以乘從二廉得一萬四千四百五十為益隅之隅併益隅方廉隅共一億一千五十五萬六千九百五十為益隅之實置一乘上廉得三百七十五萬置一自之以乘下廉得五萬置一自乘再乘隅因得二百五十為隅法併方廉隅共一億二千八百八萬二百五十加益隅之實得二億三千九百三十五萬七千二百為減實以減從餘三千六百二千為下法與上法相乘除實盡右二法已見四卷通勾皇極弦下因其頭緒太繁故重出以便學者丙出南門南行乙出南門東行各不知步數而立甲從城外西北乾隅南行六百步望乙丙悉與城相叅直既而丙欲就乙乃斜行一百五十三步相㑹問城徑釋曰此以通股明弦立法測望丙出南門而南為明股乙出南門而東為明勾丙之斜行就乙則明弦也甲南行六百通股也術曰通股自之得三十六萬為通股筭又以通股乘之得二億一千六百萬明弦乘通股筭倍之得一億一千一十六萬二數相減餘一億五百八十四萬為立方實倍通股筭得七十二萬明弦通股相乘倍之得一十八萬三千六百二數相減餘五十三萬六千四百為從方通股六之得三千六百為從廉六為隅筭作帶從廉負隅以隅減從開立方法除之得半徑帶從廉負隅以隅減從開立方曰置所得立實以從方廉約之初商一百置一於左上為法置一乘從廉得三十六萬置一自之又以隅因之得六萬為隅法以減從方餘四十七萬六千四百併從廉共八十三萬六千四百為下法與上法相乘除實八千三百六十四萬餘實二千二百二十萬倍從廉得七十二萬三因隅法得一十八萬為方法三因初商得三百以隅因之得一千八百為廉法次商二十置一於左上為法置一乘從廉得七萬二千加入倍廉得七十九萬二千置一自之又隅因得二千四百為隅法置一乘廉法得三萬六千併方法廉隅共二十一萬八千四百以減原從方餘三十一萬八千併入從廉共一百一十一萬為下法與上法相乘除實盡又為帶從方廉負隅以隅添積開立方法其法曰初商一百置一於左上為法置一自之以隅因得六萬與上法相乘得六百萬為益實添入積内共一億一千一百八十四萬為實置一乘從廉得三十六萬併從方共八十九萬六千四百為下法與上法相乘除實八千九百六十四萬餘實二千二百二十萬三因隅法得一十八萬為方法三因初商以隅因得一千八百為廉法次商二十置一於左次為上法置一乘廉法得三萬六千置一自之隅因得二千四百為隅法併方廉隅共二十一萬八千四百與上法相乘得四百三十六萬八千為益實添入餘積共二千六百五十六萬八千為實倍初商加次商得二百二十以乘從廉得七十九萬二千併從方共一百三十二萬八千四百為下法與上法相乘除實盡後凡言帶從廉負隅以隅減從開立方法俱倣此或減從或添積隨意又術通股自之得三十六萬為通股筭又以斜行乘之得五千五百八萬為立方實通股明弦相乘得九萬一千八百與半通股筭相減餘八萬八千二百為從方五分為隅法作帶從負隅開立方法除之得三百六十為股圓差以減通股得城徑帶從方負隅開立方曰置實於左從于右約初商得三百置一於左上為法置一自之得九萬以隅算五分因得四萬五千為隅法併從方共一十三萬三千二百為下法與上法相乘除實三千九百九十六萬餘實一千五百一十二萬三因隅法得一十三萬五千併從方共二十二萬三千二百為方法三因初商得九百隅因得四百五十為廉法次商六十置一於左上為法置一乘廉法得二萬七千置一自之隅因得一千八百為隅法併方廉隅共二十五萬二千為下法與上法相乘除實盡後凡言帶從方負隅開立方法者俱倣此丙出南門東行乙出東門南行各不知步數而立甲從城外西北乾隅南行六百步望乙丙與城相叅直既而乙欲就内乃斜行一百二步相㑹問城徑釋曰此以通股太虚弦立法測望甲南行通股也丙斜行一百二步就乙太虚弦也術曰南行自之得三十六萬為通股筭以斜步乘之得三千六百七十二萬倍之得七千三百四十四萬為立方實倍南行乘斜行得一十二萬二千四百倍南行筭得七十二萬二數相併得八十四萬二千四百為從方四之南行得二千四百為益廉四步為隅算作帶從負隅以從廉減從方開立方法除之得半徑帶從負隅以廉減從方開立方法見四卷通勾弦條下又為帶從負隅以廉添積開立方法法見四卷通勾太虚弦條下又術通股筭乘太虚弦倍之得七千三百四十四萬為立實通股虚弦相乘得六萬一千二百加通股筭得四十二萬一千二百為從方以通股六百為益廉五分為隅算作帶從負隅以廉減從開立方法除之得全徑法與前同或減從或添積隨意東門外往南不知步數有石柱一箇乙出東門直行不知步數而立甲從城外西北乾隅南行六百步望石柱與乙與城相叅直乙乃斜行三十四步至石柱下問城徑釋曰此以通股弦立法測望甲南行通股也乙斜行弦也術曰通股弦相乘得二萬四百又以通股筭三十六萬乘之得七十三億四千四百萬為三乘方實弦乘通股筭三之得三千六百七十二萬為從方通股筭内減去兩箇通股弦相乘之數餘三十一萬九千二百為從一廉倍通股得一千二百為第二廉二為隅算作帶從方廉負隅以二廉減從開三乘方法除之得半徑帶從方廉負隅以二廉減從開三乘方曰置所得三乘方實以從方廉隅算約之初商一百置一於左上為法置一自之以乘二廉得一千二百萬為減廉以減從方餘二千四百七十二萬為從方置一乘從一廉得三千一百九十二萬為益廉置一自乘再乘又以隅法因之得二百萬為隅法併從方益廉隅法得五千八百六十四萬為下法與上法相乘除實五十八億六千四百萬餘實一十四億八千萬四因隅法得八百萬為方法初商自之六因又以隅法因之得一十二萬為上廉初商四之又以隅因之得八百為下廉約次商得二十置一於左次為上法倍初商加次商得二百二十以乘二廉得二十六萬四千又併初次商得一百二十因之得三千一百六十八萬為減廉以減餘從不及減反減餘從二千四百七十二萬餘六百九十六萬為負從倍初商加次商為二百二十以乘從一廉得七千二十二萬四千為益廉置一乘上廉得二百四十萬置一自之以乘下廉得三十二萬置一自乘再乘又以隅因之得一萬六千為隅法併方法益廉上下廉隅法共八千九十六萬減去負從六百九十六萬餘七千四百萬為下法與上法相乘除實盡此術已見四卷通勾明弦條下因後有翻減從不同故重出又為帶從方負隅以二廉添積開三乘方如前約初商一百置一於左上為法置一自之以乘從二廉得一千二百萬與上法相乘得一十二億為益積添入原積共八十五億四千四百萬為實置一乘從一廉得三千一百九十二萬為益廉置一自乘再乘又以隅算因之得二百萬為隅法併從方益廉隅法共七千六十四萬為下法與上法相乘除實七十億六千四百萬餘實一十四億八千萬倍益廉得六千三百八十四萬四因隅法得八百萬為方法初商自之六因又隅因得一十二萬為上廉初商四之又隅因得八百為下廉約次商得二十置一於左次為上法倍初商加次商為二百二十併初次商得一百二十相因得二萬六千四百又加初商自之一萬共三萬六千四百以乘從二廉得四千三百六十八萬與上法相乘得八億七千三百六十萬為益實添入餘積共二十三億五千三百六十萬為實置一乘從一廉得六百三十八萬四千併倍益廉共七千二十二萬四千置一乘上廉得二百四十萬置一自之以乘下廉得三十二萬置一自乘再乘以乘隅算得一萬六千為隅法併方法從方益廉上下廉隅法共一億一千七百六十八萬為下法與上法相乘除實盡又術曰半通股筭以乘通股筭得六百四十八億為三乘方實通股自乘再乘得二億一千六百萬弦乘通股筭得一千二百二十四萬倍得二千四百四十八萬二數相併得二億四千四十八萬為從方弦乘通股倍之為四萬八百以減通股筭餘三十一萬九千二百為從一廉以通股六百為從二廉半步為隅算作帶從廉負隅減從以二廉益從