body:
  text: 測圓海鏡分類釋術卷八元李冶撰明顧應􅖤釋術諸和立法測望一甲丙二人俱在城外西北乾隅甲東行丙南行乙出南門東行丁出東門南行各不知步數而立四人遥相望與城相叅直既而相會各言步數甲云我與乙共行了三百九十二步丙云我與丁共行了六百三十步問城徑釋曰此通勾明勾和與通股股和立法測望甲從乾東行為通勾乙從南門外東行為明勾共行三百九十二步通勾明勾和也丙從乾隅南行為通股丁出東門南行為股共行六百三十步通股股和也術曰甲乙共步自之得一十五萬三千六百六十四為通勾明勾和筭丙丁共步自之得三十九萬六千九百為通股股和筭二筭相乘得六百九億八千九百二十四萬一千六百為三乘方實丙丁共步互乘通勾明勾和筭得九千六百八十萬八千三百二十甲乙共步互乘通股股和筭得一億五千五百五十八萬四千八百二數相併得二億五千二百三十九萬三千一百二十為從方又以二筭相併得五十五萬五百六十四步以七分半因之得四十一萬二千九百二十三二共步相乘得二十四萬六千九百六十二數相减餘一十六萬五千九百六十三為從一亷二共步相併得一千二十二以七分半因之得七百六十六步半為第二亷以七分半因七分半得五分六釐二毫五絲以减全步餘四分三釐七毫五絲為隅筭作帶從方亷隅以二亷减從開三乘方法除之得全徑帶從方亷隅筭以二亷减從開三乘方曰置所得三乘方實以亷隅約之初商二百置一於左上為法置一自之得四萬以乘從二亷得三千六十六萬以减從方餘二億二千一百七十三萬三千一百二十為從置一乘從一亷得三千三百一十九萬二千六百置一自乘再乘得八百萬以隅筭因之得三百五十萬為隅法併從方從亷隅法共二億五千八百四十二萬五千七百二十為下法與上法相乘除實五百一十六億八千五百一十四萬四千餘實九十三億四百九萬七千六百為次商之實四因隅法得一千四百萬為方法初商自之六因又以隅筭因之得一十萬五千為上亷初商四之又以隅筭因之得三百五十為下亷約次商得四十置一於左上為法倍初商加次商得四百四十以乘從二亷得三十三萬七千二百六十又併初次商得二百四十因之得八千九十四萬二千四百為减亷以减餘從餘一億四千七十九萬七百二十為從倍初商加次商得四百四十以乘從一亷得七千三百二萬三千七百二十為益亷置一乘上亷得四百二十萬置一自之以乘下亷得五十六萬置一自乘再乘得六萬四千又以隅筭因之得二萬八千為隅法併方法從方益亷上下亷隅法共二億三千二百六十萬二千四百四十為下法與上法相乘除實盡又為帶從方亷隅以二亷添積開三乘方法甲乙俱出東門甲東行乙南行丙丁俱出南門丙南行丁東行各不知步數而立四人遙相望俱與城相叅直既而乙復斜行與甲會丙復斜行與丁會問其行步乙云我一直一斜共六十四步丙云我一直一斜共二百八十八步問城徑釋曰此明股弦和與股弦和立法測望甲出東門東行為勾乙南行為股斜行會甲為弦共行六十四步股弦和也丁出南門東行為明勾丙南行為股斜行會丁為弦共行三百八十八歩股弦和也術曰二和相乘得一萬八千四百三十二為二和相乘筭和自之得四千九十六為和筭倍之以减二和相乘筭餘一萬二百四十為實一十四乘和得八百九十六以二十為隅筭作帶從負隅開平方法除之得一十六為勾勾自乘和除之得股弦較四加和半之為弦减和半之為股十四即勾股較二十即弦較較帶從負隅開平方法見二卷底勾通弦條甲乙二人俱出東門甲東行乙南行丙丁二人俱出南門丙南行丁東行各不知步數而立四人遙相望俱與城相叅直既而甲復斜行與乙會丁復斜行與丙會詢其行步甲云我直斜共五十步丁云我直斜共二百二十五步問城徑釋曰此明勾弦和與勾弦和立法測望甲出東門直行為勾斜行就乙為弦共歩和也丁出南門東行為明勾斜行就丙為明弦共步和也術曰以丁共步自之得五萬六百二十五為明和筭又自之得二十五億六千二百八十九萬六百二十五於上二共步相乘得一萬一千二百五十半之得二億八千四百七十六萬五千六百二十五以减上位餘二十二億七千八百一十二萬五千為平實二共步相减餘一百七十五為二和差以乘明和筭倍之得一千七百七十一萬八千七百五十於上倍甲共步得一百以乘明和筭又半之得二百五十三萬一千二百五十併上共二千二十五萬為從以二行相减差自之得三萬六百二十五於上又以二共步相乘數半得五千六百二十五减上位餘二萬五千為隅法作負隅减從開平方法除之得明股負隅减從開平方法曰初商一百置一於左上為法置一乘隅法得二百五十萬以减從方餘一千七百七十五萬為下法與上法相乘除實一十七億七千五百萬餘實五億三百一十二萬五千為實餘從内再减二百五十萬餘一千五百二十五萬為從次商三十置一於左上為法置一乘隅法得七十五萬以减從方餘一千四百五十萬與上法相乘除實四億三千五百萬餘實六千八百一十二萬五千為實餘從内再减七十五萬餘一千三百七十五萬為從次商五置一於左上為法置一乘隅法得一十二萬五千以减餘從餘一千三百六十二萬五千為下法與上法相乘除實盡負隅减從開平方法已見二卷通勾勾下因有三位故重出明股與勾弦和求勾弦股自乘和除之得勾弦較减和半之為勾加和半之為弦甲乙俱出東門甲東行乙南行丙丁俱出南門丙南行丁東行各不知步數而立四人遥相望俱與城相叅直問其行步則甲乙共四十六步丙丁共二百七步問城徑釋曰此明勾股和與勾股和立法測望甲東行勾乙南行股丁出南門東行明勾丙南行明股甲乙共步勾股和也丙丁共步明勾股和也術曰二共步相併得二百五十三自之得六萬四千九二共步相乘四之得三萬八千八十八二數相减餘二萬五千九百二十一為實二共步相併以六步半因之得一千六百四十四步半二共步相併以四步半因之又四之得四千五百五十四步二數相併得六千一百九十八步半為從方以七十步四分三釐七毫五絲為隅法作負隅帶從開平方法除之得四步為股弦較負隅帶從開平方法曰置實從方隅約之商得四置一於左上為法置一乘隅得二百八十一步七分五釐帶從方共六千四百八十步二分五釐與上法相乘除實盡又曰副置二和以約分法約之得二十三為平率以除明和得九除和得二二和相减餘一百六十一以平率除之得七為較率九因得明較六十三二因得較一十四以較加和半之為股减和半之為勾甲乙俱出東門甲東行乙南行丙丁俱出南門丙南行丁東行各不知步數而立四人遙相望俱與城相叅直問其行步甲與丁共八十八步乙與丙共一百六十五步問城徑釋曰此明勾勾和與明股股和立法測望甲出東門東行為勾丁出南門東行為明勾共行八十八步二勾和也乙出東門南行為股丙出南門南行為明股共行一百六十五步二股和也術曰二和相减約得一十一相平為壘率以除勾和得八為勾率除股和得一十五為股率勾股相併得二十三為和率相减得七為較率勾股求弦得一十七為弦率以勾减弦得九為大差率大差者勾弦較也以股减弦得二為小差率小差者股弦較也六為黄方率各以壘率乘二和共得二百五十三二較共得七十七二弦共得一百八十七二黄方共得六十六二大差共得九十九二小差共得二十二四差共一百二十一二大差共與二小差共相乘得二千一百七十八為實四差共為法除之得一十八即半虛黄方倍之加二黄共得一百二即明勾股共也减二弦共得一百五十一即明股勾共也二數相减餘四十九即明較較較也名為旁差旁差减二弦共餘一百三十八為太虛和加虛弦即城徑虚弦與明勾股共同數又曰虛黄方加二和共得二百八十九减旁差即城徑甲丙二人俱從城中心甲東行出城直行丙南行出城直行乙丁二人俱在城外東南巽隅乙西行丁北行各不知步數而立四人遥相望俱與城相叅直問其行則甲東丙南共三百九十一步乙西丁北共一百三十八步問城徑釋曰此皇極勾股和與太虛勾股和立法測望甲從城心東行至川一百三十六為皇極勾丙從城心南行至日二百五十五步為皇極股共步勾股和也乙從巽隅西行至月四十八步即泛之山為太虛勾丁從巽隅北行九十步至山即月之泛為太虛股共步勾股和也術曰二和相乘得五萬三千九百五十八為實相併得五百二十九為法實如法而一得太虛弦一百二圓城西門外往南二百五十五步有塔甲乙二人俱在塔下甲南行乙東行丙丁二人俱在城外東北艮隅丙東行丁南行戊巳二人俱出南門戊南行巳東行庚辛二人俱出東門庚東行辛南行各不知步數而八人遥相望俱與城相叅直問其行步則乙之東不及甲之南與丙之東不及丁之南二不及數共一百六十一步己之東不及戊之南庚之東不及辛之南二不及數共七十七步問城徑釋曰此上高勾股較下平勾股較和與明勾股較勾股較和立法測望西門外往南有塔乃西之旦與日之心同甲乙從塔下分行甲往東乃旦之日為上高勾乙復往南即天之旦為上高股勾不及股一百五為高差丙丁從城外東北艮隅分行丙往東乃艮之地為下平勾丁往南即山之東為下平股勾不及股五十六為平差二不及共數高差平差和也戊己從南門分行己往東乃南之月為明勾戊往南即日之南為明股勾不及股六十三步為明差庚辛從東門分行庚往東乃東之川為勾辛往南即山之東為股勾不及股一十四步為差二不及共步明差差和也諸和與較參互立法測望二南門外不知步數有槐一株甲從城外西北乾隅直往東行至一栁樹下望見槐樹遂斜行至槐自云我直斜共行了七百四十五步乙從城外西南坤隅南行望見槐栁與城相參直亦斜行至槐自云我斜行不及直行一百五步釋曰此通勾底弦和與大差股上高弦較立法測望南門有槐乃日之南為明股甲從乾東行至栁乃乾之地為通勾斜行至槐下乃日之地為底弦共行七百四十五步者通勾底弦和也乙從坤隅南行至望處乃天之坤為大差股亦斜行至槐乃天之日為上高弦不及直行一百五步者大差股上高弦較也術曰甲知步内减乙較步半之為通勾加乙較步半之為底弦用通勾底弦測城徑法求之得半徑又曰四較步乘通勾筭得四千三百八千為立實倍通勾乘通勾得二十萬四千八百四較乘通勾得一十三萬四千四百相减餘七萬四百為從方四之通勾得一千二百八十為益亷作帶從减廉開立方法除之得全徑帶從减從亷開立方曰列置所得立實方亷初商二百置一於左上為法置一乘從亷得二十五萬六千置一自之得四萬為隅法併從方共一十一萬四百以减從亷餘一十四萬五千六百為下法與上法相乘除實二千九百一十二萬餘一千三百八十八萬八千為次實倍從亷得五十一萬二千三因隅法得一十二萬為方法三因初商得六百為亷法次商四十置一於左上為法置一乘從亷得五萬一千二百併入倍亷共五十六萬三千二百為益亷置一乘亷法得二萬四千置一自之得一千六百為隅法併方法從方亷隅共二十一萬六千以减益亷餘三十四萬七千二百與上法相乘除實盡諸和與較參互立法三圓城西門外直上南有栁樹一株東門外往東有槐樹一株俱不知步數甲從城外西北乾隅南行至栁樹下望見槐樹又斜行至槐樹下直斜共行了一千一百四十四步乙從城外東北艮隅東行望槐柳與城相叅直復斜行至槐樹下與甲㑹乙東行不及斜行五十六步問城徑釋曰此通股邊弦和與小差勾下平弦較立法測望甲從乾隅南行至柳下為通股斜行至槐為邊弦共行一千一百四十四步通股邊弦和也乙從艮隅東行乃艮之地為小差勾斜行至槐乃地之川為下平弦不及五十六步小差勾與下平弦較也術曰如乙直行不及斜行五十六即甲斜行不及直行差也副置甲共步其一加五十六而半之得甲直行六百步為通股其一减五十六而半之得甲斜行五百四十四步為邊弦以五十六乘甲南行又倍南行得一千二百乘之得四千三十二萬為立方實又以五十六乘南行倍之得六萬七千二百半甲南行乘二之甲南行得三十六萬相併得四十二萬七千二百為從方倍南行得一千二百為從亷五分為隅法作從負隅以亷减從翻法開立方法除之得全徑帶從負隅以亷减從翻法開立方曰置所得立方實以從方亷隅約之初商二百置一於左上為法置一乘從亷得二十四萬以减從方餘一十八萬七千二百為從置一自之得四萬隅因得二萬併從方共二十萬七千二百為下法與上法相乘除實四千一百四十四萬實不滿法反除實四千三十二萬餘一百一十二萬為負積餘從内再减從亷二十四萬亦不及减反减餘從一十八萬七千二百餘五萬二千八百為負從三因隅法得六萬為方法三因初商得六百為亷法次商四十置一於左上為法置一乘從亷得四萬八千反併負從得一十萬八百俱為負從置一乘亷法隅因得一萬二千置一自之隅因得八百為隅法併方亷隅共七萬二千八百反减負從餘二萬八千為下法四千相乘除實盡此法已見四卷通勾弦條因用法不同故重出又為帶從負隅以亷添積開立方亦可甲出南門東行乙出東門南行各不知步數而立相望與城相參直既而乙復斜行與甲㑹計乙行步一直一斜共一百三十二步直行不及斜行七十二步問城徑釋曰此股虚弦和與股虚弦較立法測望甲出南門東行為明勾七十二乙出東門南行為股三十斜行與甲㑹為太虚弦一百二直行不及斜行七十二為股虛弦較適與明勾同數直斜相併則股虛弦和也即兩箇乙南行一箇甲東行去共二數相併即兩箇虛弦相减即兩箇乙南行也術曰倍不及得一百四十四以不及减共步餘六十乘之得八千六百四十為實四之不及得二百八十八為法除之得乙直行三十為股以减共步餘為虚弦求城徑倍虛弦筭减和筭餘為實平方開之即太虚較四十二加和半之為股减和半之為勾以虚勾股求容圓即得又為帶從負隅以亷添積開立方法甲出南門東行不知步數而立乙出東門南行相望與城相叅直乙復斜行與甲㑹二人共行了二百四步甲東行不及共步一百三十二步釋曰此明勾股太虚弦和又與明勾相較立法測望甲出南門東行七十二步為明勾乙出東門南行三十步為股斜行一百二步與甲會為太虚弦共步明勾股太虚弦和也甲行不及共步和與明勾相較之數也術曰以不及减共步餘七十二為明勾即甲東行步半共步减明勾餘三十為股即乙南行步半共步得一百二為太虚弦即乙斜行步乙南行减甲東行餘四十二即太虛較較自之與弦自之相减餘為實平方開之即勾股和加較半之為股减較半之為勾以虛勾股求容圓得城徑圓城南門之東有槐一株東門之南有柳一株甲出南門直行往南乙出東門直行往東各不知步數而立相望槐柳俱與城相叅直甲復向東北斜行至槐樹下乙復向西南斜行至柳樹下問其行步則甲直斜共行二百八十八步乙直斜共行五十步甲直行乙直行相併多於槐柳相距四十九步問城徑釋曰此明股弦和勾弦和又明股勾和與太虛弦較立法測望槐在南門之東七十二步為明勾甲出南門直行為明股斜行至槐柳下為明弦共行二百八十八步明股弦和也柳在東門之南三十步為股乙出東門直行為勾斜行至柳樹下為弦共行五十步為勾弦和也槐柳斜相距一百二步為太虛弦甲直行與乙直行相併得一百五十一步為明股勾和多於虛弦四十九步是明股勾和與太虛弦較也術曰二和相併减二之多於太虛弦步即城徑又曰二和相乘即半徑筭圓城中心往南有大石塔一座城外東北艮隅往東有小石塔一座東門外正東有柳樹一株東門外往南有大槐樹一株其大槐樹正與城中大石塔相對不差尺寸南門往東有榆樹一株甲從石塔下起程出南門直行往南不知步數而立乙從東門起程直行至柳樹下折而北至小石塔下又往東不知步數而立望柳槐榆與甲立處俱與城相叅直問其步數則曰甲從南門至立處乙從東門至柳樹下相併多於榆槐斜相距四十九步石塔穿城至甲立處多於石塔與槐相距栁樹北往小石塔步數多小石塔下復往東步數二較相併一百六十一步問城徑釋曰此明股勾和與太虛弦較下髙勾股較與下平勾股較和立法測望南門外往東有榆乃南之月為明勾甲出南門復南行為明股東門外往南有槐乃山之東為股乙從東至柳乃東之川為勾榆與槐斜相距乃月之山為太虛弦甲南門至立處乙東門至栁下共步為明股勾和多於槐榆相距四十九步乃明股勾和與太虛弦較也城中有大石塔至南門外甲立處乃日之朱為下髙股塔距槐乃朱之山為下髙勾甲穿城南行步多於塔去槐步乃下髙勾股較也城東柳樹北至小石塔乃川之夕為平股石塔復東行至立處乃夕之地為下平勾南行多於東行步下平勾股較也二較相併一百六十一步髙差平差和也術曰二數相减半之又自之得三千一百三十六為實以四十九為法除之得平勾六十四又曰二數相减餘自之得一萬二千五百四十四為實如四十九而一得平股弦和二百五十六勾自之和除之得平股弦較一十六加和半之為弦减和半之為股城心上南有大石塔城南門往東有榆一株東門往南有大槐一株與城中石塔東西相對東門直東有栁一株城外東北艮隅往東有小石塔與城東栁樹南北相對甲從城中塔下起程穿城出城直往南不知步數而立乙從東門起程直行至柳樹下折而北往小石塔下又往東亦不知步數望甲與柳槐榆俱與城相參直甲復斜行向東北直至柳樹下問其行步則曰甲從大石塔穿城南行立處多於大石塔與槐相去步數乙從栁樹北行至小石塔多於從石塔東行步數二較相併共一百六十一步甲從南起程至立處多於南門距榆樹步數東門南至槐多於東至栁步數二較相併共七十七步斜行至栁下多於城徑四十九步問城徑釋曰此髙較平較和與明較較和并皇極弦與城徑較立法測望甲從城中石塔下穿城往南而立乃日之朱下髙股也大石塔與城外槐樹相距乃朱之山下髙勾也多步乃下髙勾股較也乙從城東門栁樹下折而往北至小石塔下乃川之夕下平股也復往東乃夕之地下平勾也多步乃下平勾股較也二較相併共一百六十一步乃平差髙差和也又名角差甲自南門往南立處乃日之南明股也南門往東至榆樹乃南之月明勾也多步明勾股較也東門往南至槐乃山之東股也直東門至栁乃東之川勾也多步勾股較也二較相併七十七步明差差和也甲從直南立處斜行至栁樹下乃日之川皇極弦也多城徑四十九步為皇極弦與城徑較即皇極弦黄廣勾較也術曰二和相併半之得一百十九為平率副置平率一加四十九一减四十九相乘得一萬一千七百六十為實四十九為法實如法而一得城徑城心往南有大石塔一座東門外往南有大槐一株與塔相對南門外往東有榆樹一株東門外正東有栁樹一株城外東北艮隅往東有小石塔一座甲從城中石塔下穿城直往南不知步數而立乙從東門直行至栁樹下轉往北至石塔復往東亦不知步數而立丙從城外東南巽隅往西至榆樹下立三人遙相望與槐樹俱與城相叅直既而丙又斜行至槐樹下復南行回還巽隅訖問其行步則曰甲從大石塔穿城往南立處多於槐距塔步數乙從東門外栁樹下北至小石塔多於復東行歩數二較相併共一百六十一步甲自南門起至立處多於南門距榆步數東門外往南至槐多於往東至栁步數二較相併共七十七步丙從巽隅西至榆步數與從栁南還步又少於斜行六十步問城徑釋曰此髙差平差和明差差和與太虛弦較較立法測望甲從城中石塔穿城往南而立為下高股石塔距槐為下高勾勾股相較為下高較亦曰高差乙從東門外栁樹下北至小石塔為下平股又東行至立處為下平勾勾股相减為下平較亦曰平差共一百六十一步高差平差和也南門至甲立處為明股南門東至榆樹為明勾勾股相减為明較即明差東門南至槐為股東至栁為勾勾股相减為較即差共七十七步明差差和也丙從巽隅西至榆乃巽之月與泛之山同為太虛勾斜行至槐樹下為太虚弦復南行還巽地與月之泛同為太虛股西行不及南行為太虚勾股較較步不及斜行六十為太虚弦較較也術曰二和相减餘八十四加太虛弦較較半之得七十二為泛率自之得五千一百八十四為實角差内减二汎率餘一十七為從作帶從開平方法除之得六十四為平勾角差即高差平差併也甲丙二人俱在城中心丙望南門直行出城不知步數而立甲望東門出城亦不知步數望見之丙復斜行與甲相會問其行步則曰甲丙直斜共行了六百八十步又曰甲東直行少於丙南直行一百一十九步問城徑釋曰此皇極弦和和與勾股較立法測望甲從城中心東行為皇極勾丙從中心南行為皇極股斜行與甲會為皇極弦共行六百八十步為皇極弦和和也甲東行不及丙南一百一十九步為皇極勾較也術曰二數相减餘五百六十一為差差自之得三十一萬四千七百二十一為差筭較自之得一萬四千一百六十一為較卑二筭相减餘三十萬五百六十為平實四其差二其較相併得二千四百八十二為從方二為隅筭作負隅開减從開平方法除之得一百三十六為皇極勾負隅减從開平方曰置所得平實以從方隅筭約之初商一百置一於左上為法置一乘隅筭得二百以從减方餘二千二百八十二為下法與上法相乘除實二十三萬八千二百餘實七萬二千三百六十從方内再减二百餘二千八十二次商三十置一於左上為法置一隅因得六十以减從方餘二千二十二為下法與上法相乘除實六萬六百六十餘實一萬一千七百為實餘從内再减六十餘一千九百六十二次商六置一於左上為法置一隅因得一十二以减餘從餘一千九百五十為下法與上法相乘除實盡此法已見二卷通勾勾條因有三位故重出圓城南門往東有槐東門往南有栁甲乙二人俱在城中心甲出南門直行乙出東門各不知步數而立丙丁二人俱在城外東南巽隅丙西行至槐下丁北行至栁下四人遥相望俱與城叅直既而甲復斜行與乙會丙復斜行與丁會問其行步則甲一直一斜與乙直行共六百八十步丙西丁北二直行較丙斜行多三十六步問城徑釋曰此皇極弦和和與太虛弦和較立法測望乙從城中心東行為皇極勾甲從城中心南行為皇極股斜行與乙會為皇極弦共步為皇極弦和和也丙從巽隅西至槐樹下即太虛勾丁從巽隅北至栁樹下即太虚股丙斜行與丁會為太虚弦丙西丁北相併即太虚勾股和多於斜行為太虚弦和較也術曰和較相乘得二萬四千四百八十為實半較得一十八為從半步為隅筭作以從添積負隅開平方法除之得全徑以從添積負隅開平方曰置所得平實以從約之初商二百置一於左上為法置一乘益從得三千六百為益實添入積内共二萬八千八十為實置一以隅因之得一百為下法與上法相乘除實一萬餘八千八十為實倍下法得二百為亷法次商四十置一於左上為法置一乘益從得七百二十為益實添入餘積得八千八百為實置一以隅因得二十併亷法共二百二十與上法相乘除實盡又為負隅以從减法開平方法法見四卷大差勾黄長弦條下測圓海鏡分類釋術卷八
